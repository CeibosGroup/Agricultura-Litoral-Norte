<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Agricultura Litoral Norte</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="LN Agro">
<link rel="apple-touch-icon" href="LOGO.jpeg">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f3;color:#18180f;min-height:100vh;}
#splash{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:200;}
#splash.hide{display:none;}
.sp-img{width:110px;height:auto;}
.sp-sub{font-size:12px;color:#999;}
.hdr{background:#fff;border-bottom:1px solid #e8e6de;padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.hdr-logo{height:26px;width:auto;}
.hdr-r{display:flex;gap:5px;align-items:center;margin-left:auto;}
.cpill{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid #ccc;cursor:pointer;color:#666;font-weight:500;}
.cpill.on{background:#eeedfe;border-color:#534AB7;color:#534AB7;font-weight:600;}
.sync{font-size:10px;color:#1a8a5a;display:flex;align-items:center;gap:3px;}
.ibtn{padding:5px;border-radius:6px;cursor:pointer;color:#666;font-size:16px;border:none;background:transparent;}

/* TABS */
.tabs{background:#fff;border-bottom:1px solid #e8e6de;display:flex;}
.tab{flex:1;padding:10px 0;text-align:center;font-size:12px;color:#999;cursor:pointer;border-bottom:2px solid transparent;font-weight:500;}
.tab.on{color:#534AB7;border-bottom-color:#534AB7;}
.tab-panel{display:none;}
.tab-panel.on{display:block;}

/* STATUS TAB */
.fstrip{background:#fff;border-bottom:1px solid #e8e6de;padding:7px 16px;display:flex;gap:5px;overflow-x:auto;align-items:center;scrollbar-width:none;}
.fstrip::-webkit-scrollbar{display:none;}
.fl{font-size:9px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-right:3px;white-space:nowrap;flex-shrink:0;}
.fchip{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #ccc;cursor:pointer;color:#666;white-space:nowrap;flex-shrink:0;}
.fchip.on{border-color:#333;color:#333;background:#f8f7f3;font-weight:600;}
.fsep{width:1px;height:16px;background:#e8e6de;margin:0 3px;flex-shrink:0;}

/* ALERTS */
.alerts-bar{background:#fff;border-bottom:1px solid #e8e6de;cursor:pointer;user-select:none;}
.alerts-collapsed{padding:7px 16px;display:flex;align-items:center;gap:8px;}
.alerts-expanded{padding:6px 16px 8px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.alert-badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;display:flex;align-items:center;gap:3px;}
.alert-pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.a-urg{background:#fceaea;color:#b83030;}
.a-info{background:#eeedfe;color:#534AB7;}
.a-ok{background:#e8f5ee;color:#1a8a5a;}

/* METRICS */
.mwrap{background:#fff;border-bottom:1px solid #e8e6de;padding:8px 16px;overflow-x:auto;scrollbar-width:none;}
.mwrap::-webkit-scrollbar{display:none;}
.metrics{display:flex;gap:6px;min-width:max-content;}
.metric{background:#f8f7f3;border-radius:7px;padding:7px 10px;min-width:84px;}
.ml{font-size:9px;color:#999;margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
.mv{font-size:17px;font-weight:600;}
.ms{font-size:9px;color:#999;margin-top:1px;white-space:nowrap;}
.mbar{width:100%;height:3px;border-radius:2px;background:#e8e6de;margin-top:4px;}
.mfill{height:3px;border-radius:2px;}

/* CAMPOS */
.campos{padding:10px 12px;display:flex;flex-direction:column;gap:8px;padding-bottom:50px;}
.ccard{background:#fff;border:1px solid #e8e6de;border-radius:12px;overflow:hidden;}
.chdr{padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none;}
.chdr:active{background:#f8f7f3;}
.mono{width:34px;height:34px;border-radius:8px;background:#f8f7f3;border:1px solid #e8e6de;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#666;flex-shrink:0;}
.cn{font-size:13px;font-weight:600;}.cm{font-size:10px;color:#999;margin-top:1px;}
.chev{font-size:13px;color:#999;margin-left:auto;transition:transform .2s;}
.chev.open{transform:rotate(90deg);}
.llist{border-top:1px solid #e8e6de;display:none;}
.llist.open{display:block;}
.lrow{border-bottom:1px solid #e8e6de;}
.lrow:last-child{border-bottom:none;}
.lhdr{display:flex;align-items:flex-start;gap:7px;padding:8px 14px;flex-wrap:wrap;cursor:pointer;}
.lhdr:active{background:#f8f7f3;}
.lnum{font-size:11px;font-weight:600;color:#666;min-width:22px;margin-top:2px;}
.lhas{font-size:11px;color:#999;min-width:38px;margin-top:2px;}
.cbadge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.bTr{background:#E6F1FB;color:#185FA5;}.bCz{background:#FAEEDA;color:#633806;}
.bCeb{background:#EAF3DE;color:#3B6D11;}.bCob{background:#F1EFE8;color:#5F5E5A;}
.bCar{background:#F3E8F5;color:#5A1E63;}.bSj1{background:#EEEDFE;color:#3C3489;}
.bSj2{background:#E1EAFC;color:#2A4A8A;}.bMz1{background:#FAECE7;color:#712B13;}
.bMz2{background:#F5E0D8;color:#5C1E0A;}
.re-tag{font-size:10px;background:#fdf3e0;color:#c47a12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap;}
.rot{display:flex;gap:2px;align-items:center;margin-left:auto;}
.ri{display:flex;flex-direction:column;align-items:center;gap:1px;}
.rl{font-size:8px;color:#999;white-space:nowrap;}
.ri.cur .rl{color:#534AB7;font-weight:700;}
.rb{font-size:10px;padding:1px 4px;border-radius:3px;font-weight:500;}
.rarr{font-size:9px;color:#ccc;margin-top:7px;}
.ldet{display:none;background:#f8f7f3;border-top:1px solid #e8e6de;}
.ldet.open{display:block;}
.dbanner{padding:8px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid #e8e6de;background:#fff;}
.dvar{font-size:12px;font-weight:600;}
.re-pb{display:flex;align-items:center;gap:8px;padding:5px 14px 0;}
.re-pbl{font-size:10px;color:#999;}
.re-pbg{flex:1;height:4px;border-radius:2px;background:#e8e6de;}
.re-pf{height:4px;border-radius:2px;background:#c47a12;}
.re-pv{font-size:11px;font-weight:600;color:#c47a12;min-width:28px;text-align:right;}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid #e8e6de;}
@media(max-width:480px){.sgrid{grid-template-columns:1fr;}}
.sec{padding:10px 12px;border-right:1px solid #e8e6de;}
.sec:last-child{border-right:none;}
@media(max-width:480px){.sec{border-right:none;border-bottom:1px solid #e8e6de;}.sec:last-child{border-bottom:none;}}
.st{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#999;margin-bottom:7px;display:flex;align-items:center;gap:4px;}
.li{display:flex;align-items:flex-start;gap:5px;margin-bottom:3px;padding:4px 6px;border-radius:6px;}
.li.done{background:#fff;}.li.pend{opacity:.3;}.li.finn{background:#e8eef8;}
.li i{font-size:13px;margin-top:1px;flex-shrink:0;}
.li.done i,.li.finn i{color:#1a8a5a;}.li.pend i{color:#ccc;}.li.re i{color:#c47a12;}
.lb{flex:1;min-width:0;}
.ln{font-size:11px;font-weight:600;}
.ld{font-size:10px;color:#666;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lf{font-size:10px;color:#1a8a5a;margin-top:1px;}
.ff{display:inline-flex;align-items:center;vertical-align:middle;margin-left:3px;}
.ff img{width:13px;height:13px;object-fit:contain;opacity:.85;}
.fsec{padding:10px 12px;}
.ftit{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#999;margin-bottom:8px;display:flex;align-items:center;gap:4px;}
.fgrp{margin-bottom:10px;}
.fgl{font-size:10px;color:#999;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid #e8e6de;font-weight:500;}
.frow{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:5px;}
.fc{border-radius:7px;padding:7px 8px;background:#fff;}
.fc.done{border-left:2px solid #1a8a5a;}.fc.pend{border-left:2px solid #e8e6de;opacity:.38;}
.fc.finn{border-left:2px solid #002060;background:#e8eef8;}
.fc.total{background:#eeedfe;border-left:2px solid #534AB7;}
.fcl{font-size:9px;color:#999;margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
.fc.total .fcl{color:#534AB7;}
.fcv{font-size:13px;font-weight:600;}
.fc.total .fcv{color:#534AB7;}
.fcu{font-size:9px;font-weight:400;color:#999;margin-left:1px;}
.fc.total .fcu{color:#534AB7;}
.fcd{font-size:9px;color:#1a8a5a;margin-top:2px;}
.hbar{width:100%;height:3px;border-radius:2px;background:#e8e6de;margin-top:3px;}
.hbarf{height:3px;border-radius:2px;background:#1a8a5a;}
.empty{padding:36px;text-align:center;color:#999;font-size:13px;}

/* CLIMA TAB */
.clima-wrap{padding:10px 12px;padding-bottom:50px;}
.clima-filters{background:#fff;border-bottom:1px solid #e8e6de;padding:7px 16px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;}
.clima-filters::-webkit-scrollbar{display:none;}
.suma-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;}
.suma-card{background:#fff;border:1px solid #e8e6de;border-radius:8px;padding:8px 10px;}
.sc-lbl{font-size:9px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.sc-val{font-size:18px;font-weight:600;}
.sc-sub{font-size:9px;color:#999;margin-top:1px;}
.clima-chart-card{background:#fff;border:1px solid #e8e6de;border-radius:10px;padding:12px;margin-bottom:10px;}
.clima-chart-title{font-size:10px;font-weight:600;color:#999;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.api-badge{font-size:9px;background:#E6F1FB;color:#185FA5;padding:2px 7px;border-radius:20px;}
.bars{display:flex;align-items:flex-end;gap:2px;height:70px;}
.bar{flex:1;border-radius:2px 2px 0 0;min-width:0;}
.bar.low{background:#B5D4F4;}
.bar.mid{background:#378ADD;}
.bar.high{background:#185FA5;}
.chart-axis{display:flex;justify-content:space-between;margin-top:4px;}
.chart-axis span{font-size:9px;color:#999;}
.eventos-title{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.evento-card{background:#fff;border:1px solid #e8e6de;border-radius:8px;padding:9px 12px;margin-bottom:5px;display:flex;align-items:center;gap:10px;}
.evento-icon{width:34px;height:34px;border-radius:7px;background:#E6F1FB;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.evento-info{flex:1;}
.evento-fecha{font-size:12px;font-weight:600;}
.evento-campos{font-size:10px;color:#999;margin-top:1px;}
.evento-mm{font-size:17px;font-weight:600;color:#185FA5;}
.evento-mm span{font-size:10px;font-weight:400;color:#999;margin-left:1px;}

/* EMPTY TABS */
.tab-empty{padding:60px 20px;text-align:center;color:#999;}
.tab-empty i{font-size:32px;display:block;margin-bottom:10px;color:#ccc;}
.tab-empty p{font-size:13px;}
</style>
</head>
<body>
<div id="splash">
  <img src="LOGO.jpeg" class="sp-img" alt="LN Agro">
  <div class="sp-sub">Seguimiento de labores</div>
</div>

<div id="app" style="display:none;">
  <!-- HEADER -->
  <div class="hdr">
    <img src="LOGO.jpeg" class="hdr-logo" alt="LN Agro">
    <div class="hdr-r">
      <div id="cpills" style="display:flex;gap:4px;"></div>
      <div class="sync" id="sync" style="display:none;"><i class="ti ti-cloud-check"></i><span id="synctxt"></span></div>
      <button class="ibtn" id="btnRefresh"><i class="ti ti-refresh"></i></button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab on" data-tab="status">Status</div>
    <div class="tab" data-tab="clima">Clima</div>
    <div class="tab" data-tab="indicadores">Indicadores</div>
    <div class="tab" data-tab="avances">Avances</div>
  </div>

  <!-- STATUS TAB -->
  <div class="tab-panel on" id="panel-status">
    <div class="fstrip">
      <span class="fl">Cultivo</span>
      <div id="cchips" style="display:flex;gap:5px;"></div>
      <div class="fsep"></div>
      <span class="fl">Estacion</span>
      <div class="fchip on" id="btn-inv">Invierno</div>
      <div class="fchip" id="btn-ver">Verano</div>
    </div>
    <div class="alerts-bar" id="alerts-bar">
      <div class="alerts-collapsed" id="alerts-collapsed" style="display:none;">
        <i class="ti ti-bell-ringing" style="font-size:13px;color:#b83030;"></i>
        <span id="alerts-count" style="font-size:11px;font-weight:600;color:#b83030;"></span>
        <span style="font-size:11px;color:#999;">alertas activas</span>
        <i class="ti ti-chevron-down" style="font-size:11px;color:#999;margin-left:auto;"></i>
      </div>
      <div class="alerts-expanded" id="alerts-expanded"></div>
    </div>
    <div class="mwrap"><div class="metrics" id="metrics"></div></div>
    <div class="campos" id="campos"></div>
  </div>

  <!-- CLIMA TAB -->
  <div class="tab-panel" id="panel-clima">
    <div class="clima-filters" id="clima-campo-filters"></div>
    <div class="clima-filters" style="border-top:none;" id="clima-period-filters"></div>
    <div class="clima-wrap">
      <div class="suma-cards" id="suma-cards"></div>
      <div class="clima-chart-card">
        <div class="clima-chart-title">
          <span>Precipitaciones diarias (mm)</span>
          <span class="api-badge">Open-Meteo</span>
        </div>
        <div class="bars" id="clima-bars"></div>
        <div class="chart-axis" id="clima-axis"></div>
      </div>
      <div class="eventos-title">Eventos destacados</div>
      <div id="clima-eventos"></div>
    </div>
  </div>

  <!-- INDICADORES TAB -->
  <div class="tab-panel" id="panel-indicadores">
    <div class="tab-empty">
      <i class="ti ti-chart-bar"></i>
      <p>Indicadores en desarrollo</p>
    </div>
  </div>

  <!-- AVANCES TAB -->
  <div class="tab-panel" id="panel-avances">
    <div class="tab-empty">
      <i class="ti ti-progress"></i>
      <p>Avances en desarrollo</p>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
var FINN_COLOR = 'FF002060';
var CLI = {Tr:'Trigo',Cz:'Colza',Ceb:'Cebada',Cobertura:'Cob.',Carinata:'Car.'};
var CLV = {Sj1:'Soja 1',Sj2:'Soja 2',Mz1:'Maiz 1',Mz2:'Maiz 2',Cobertura:'Cob.'};
var BCL = {Tr:'bTr',Cz:'bCz',Ceb:'bCeb',Cobertura:'bCob',Carinata:'bCar',Sj1:'bSj1',Sj2:'bSj2',Mz1:'bMz1',Mz2:'bMz2'};
var INI = {Malacara:'ML','La Blanqueada':'LB','La Campana':'LC',Montecristo:'MC','Santa Rafaela':'SR','San Luis':'SL',Pereira:'PE'};
var CAMPOS_COORDS = {
  Malacara: [-32.05,-58.20], 'La Blanqueada': [-31.95,-58.10],
  'La Campana': [-31.90,-58.05], Montecristo: [-32.00,-58.15],
  'Santa Rafaela': [-32.10,-58.25], 'San Luis': [-31.85,-58.00], Pereira: [-32.15,-58.30]
};
var RAW = 'https://raw.githubusercontent.com/CeibosGroup/Agricultura-Litoral-Norte/main';
var AD = JSON.parse(JSON.stringify(HISTORIC));
var AC = null, SE = 'inv', FC = 'all';
var openC = {}, openL = {}, alertsOpen = false;
var climaCampo = 'all', climaPeriod = 30, climaData = null;

function q(id){ return document.getElementById(id); }
function colPct(p){ return p>=70?'#1a8a5a':p>=40?'#c47a12':'#b83030'; }
function pctArea(rows,fn){ var t=rows.reduce(function(a,r){return a+r.has;},0); if(!t)return 0; return Math.round(rows.filter(fn).reduce(function(a,r){return a+r.has;},0)/t*100); }
function isProd(d){ return SE==='inv'?['Tr','Cz','Ceb','Carinata'].indexOf(d.cult)>=0:['Sj1','Sj2','Mz1','Mz2'].indexOf(d.cult)>=0; }
function isMz(d){ return d.cult==='Mz1'||d.cult==='Mz2'; }
function totalUrea(d){ if(SE==='inv')return(d.urea_siem&&d.urea_siem.kg||0)+(d.z22&&d.z22.kg||0)+(d.z30&&d.z30.kg||0)+(d.z33&&d.z33.kg||0); return(d.urea_siem&&d.urea_siem.kg||0)+(d.v4&&d.v4.kg||0)+(d.v8&&d.v8.kg||0); }
function sid(s){ var h=0; for(var i=0;i<s.length;i++){h=(Math.imul(31,h)+s.charCodeAt(i))|0;} return 'x'+(h>>>0).toString(36); }
function FS(){ var img=document.createElement('img'); img.src='data:image/png;base64,'+FINN_B64; img.style.cssText='width:13px;height:13px;object-fit:contain;opacity:.85;vertical-align:middle;margin-left:3px;'; return img.outerHTML; }
function rotB(c){
  if(!c) return '<span style="font-size:8px;color:#ccc">?</span>';
  var CL=SE==='inv'?CLI:CLV;
  var el=document.createElement('span'); el.className='rb '+(BCL[c]||'bCob'); el.textContent=CL[c]||c;
  return el.outerHTML;
}

// ── TABS ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.onclick = function() {
      var t = this.getAttribute('data-tab');
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});
      document.querySelectorAll('.tab-panel').forEach(function(x){x.classList.remove('on');});
      this.classList.add('on');
      q('panel-'+t).classList.add('on');
      if(t==='clima') initClima();
    };
  });

  q('btn-inv').onclick = function(){ setSeason('inv'); };
  q('btn-ver').onclick = function(){ setSeason('ver'); };
  q('btnRefresh').onclick = function(){ updateBg(); };
  q('alerts-bar').onclick = function(){ toggleAlerts(); };

  document.addEventListener('click', function(e) {
    var chdr = e.target.closest('.chdr[data-cid]');
    if(chdr){ togC(chdr.getAttribute('data-cid')); return; }
    var lhdr = e.target.closest('.lhdr[data-lid]');
    if(lhdr){ togL(lhdr.getAttribute('data-lid')); return; }
  });

  start();
  loadXLSX();
});

function start() {
  AD = JSON.parse(JSON.stringify(HISTORIC));
  var camps = Object.keys(AD).sort().reverse();
  AC = camps[0];
  q('splash').classList.add('hide');
  q('app').style.display = 'block';
  buildPills(camps);
  render();
}

function loadXLSX() {
  var s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload = updateBg;
  document.body.appendChild(s);
}

async function updateBg() {
  if(typeof XLSX==='undefined') return;
  var now = new Date();
  for(var y=now.getFullYear()+2; y>=2024; y--) {
    var yy=String(y).slice(2), yp=String(y+1).slice(2), camp=yy+'-'+yp;
    try {
      var ctrl=new AbortController(); setTimeout(function(){ctrl.abort();},12000);
      var res=await fetch(RAW+'/Planilla_labores_'+yy+'-'+yp+'.xlsx',{cache:'no-store',signal:ctrl.signal});
      if(!res.ok) continue;
      var buf=await res.arrayBuffer(), wb=XLSX.read(buf,{cellStyles:true});
      AD[camp]={inv:parseSheet(wb,'Invierno'),ver:parseSheet(wb,'Verano')};
      var camps=Object.keys(AD).sort().reverse(); AC=camps[0];
      buildPills(camps); render();
      q('synctxt').textContent=camp; q('sync').style.display='flex';
      break;
    } catch(e){ continue; }
  }
}

function buildPills(camps) {
  var el=q('cpills'); el.innerHTML='';
  camps.forEach(function(c){
    var d=document.createElement('div'); d.className='cpill'+(c===AC?' on':'');
    d.textContent=c;
    d.onclick=(function(camp){return function(){setCamp(camp);};})(c);
    el.appendChild(d);
  });
}
function setCamp(c){ AC=c; document.querySelectorAll('.cpill').forEach(function(el){el.classList.toggle('on',el.textContent===c);}); render(); }

// ── ALERTS ────────────────────────────────────────────────────
function toggleAlerts() {
  alertsOpen = !alertsOpen;
  q('alerts-collapsed').style.display = alertsOpen ? 'none' : 'flex';
  q('alerts-expanded').style.display = alertsOpen ? 'flex' : 'none';
}

function getLoteAlerts(d) {
  var a = [];
  if(SE!=='inv'||d.cult!=='Cz') return a;
  var ref = d.siem&&d.siem.fecha ? d.siem.fecha : null;
  if(d.re1&&d.re1.fecha&&d.re1.ha&&d.has&&Math.round(d.re1.ha/d.has*100)>=50) ref=d.re1.fecha;
  if(!ref) return a;
  var p=ref.split('/'); var sd=new Date(+p[2],+p[1]-1,+p[0]); var TODAY=new Date();
  [40,60].forEach(function(n){
    var dt=new Date(sd); dt.setDate(dt.getDate()+n);
    var r=Math.round((dt-TODAY)/86400000);
    if(r>=0&&r<=5) a.push({tipo:r<=2?'urg':'info',msg:'N d'+n+' en '+r+'d ('+dt.getDate()+'/'+(dt.getMonth()+1)+')'});
  });
  return a;
}

function renderAlerts(allAlerts) {
  var coll = q('alerts-collapsed'), exp = q('alerts-expanded');
  if(!allAlerts.length) {
    coll.style.display = 'none';
    exp.style.display = 'flex';
    exp.innerHTML = '<span style="font-size:11px;color:#999;display:flex;align-items:center;gap:5px;"><i class="ti ti-circle-check" style="color:#1a8a5a;font-size:13px;"></i>Sin alertas activas</span>';
    return;
  }
  // Update collapsed
  q('alerts-count').textContent = allAlerts.length;
  coll.style.display = alertsOpen ? 'none' : 'flex';
  // Update expanded
  var h = '<span style="font-size:9px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:3px;white-space:nowrap;margin-right:2px;"><i class="ti ti-bell-ringing"></i>Alertas</span>';
  allAlerts.slice(0,6).forEach(function(a){
    var cls = a.tipo==='urg' ? 'a-urg' : 'a-info';
    h += '<div class="alert-pill '+cls+'"><i class="ti ti-microscope" style="font-size:10px;"></i><strong>'+a.campo+' L'+a.lote+'</strong> &middot; '+a.msg+'</div>';
  });
  exp.innerHTML = h;
  exp.style.display = alertsOpen ? 'flex' : 'none';
  // Push notifications
  pushNotify(allAlerts);
}

function pushNotify(alerts) {
  if(!('Notification' in window)) return;
  if(Notification.permission==='default'){ Notification.requestPermission(); return; }
  if(Notification.permission!=='granted') return;
  if(window._notifSent) return; window._notifSent=true;
  alerts.slice(0,3).forEach(function(a){
    try{ new Notification('LN Agro · '+a.campo+' L'+a.lote,{body:a.msg,icon:'LOGO.jpeg'}); }catch(e){}
  });
}

// ── CLIMA ─────────────────────────────────────────────────────
var climaInited = false;

function initClima() {
  if(climaInited) return;
  climaInited = true;

  // Campo filter
  var campos = Object.keys(INI);
  var cf = q('clima-campo-filters'); cf.innerHTML='';
  [{v:'all',l:'Todos'}].concat(campos.map(function(c){return{v:c,l:c};})).forEach(function(o){
    var el=document.createElement('div'); el.className='fchip'+(climaCampo===o.v?' on':'');
    el.setAttribute('data-v',o.v); el.textContent=o.l;
    el.onclick=(function(v){return function(){climaCampo=v;document.querySelectorAll('#clima-campo-filters .fchip').forEach(function(x){x.classList.toggle('on',x.getAttribute('data-v')===v);});fetchClima();};})(o.v);
    cf.appendChild(el);
  });

  // Period filter
  var pf = q('clima-period-filters'); pf.innerHTML='';
  [{v:7,l:'7 días'},{v:30,l:'30 días'},{v:90,l:'Campaña'}].forEach(function(o){
    var el=document.createElement('div'); el.className='fchip'+(climaPeriod===o.v?' on':'');
    el.setAttribute('data-v',o.v); el.textContent=o.l;
    el.onclick=(function(v){return function(){climaPeriod=v;document.querySelectorAll('#clima-period-filters .fchip').forEach(function(x){x.classList.toggle('on',parseInt(x.getAttribute('data-v'))===v);});fetchClima();};})(o.v);
    pf.appendChild(el);
  });

  fetchClima();
}

async function fetchClima() {
  // Get coordinates - use center of all campos or specific campo
  var lat = -32.0, lon = -58.15;
  if(climaCampo!=='all' && CAMPOS_COORDS[climaCampo]) {
    lat = CAMPOS_COORDS[climaCampo][0];
    lon = CAMPOS_COORDS[climaCampo][1];
  }

  var endDate = new Date();
  var startDate = new Date();
  if(climaPeriod===90){
    startDate = new Date(2026,3,1); // April 2026 - start of campaign
  } else {
    startDate.setDate(startDate.getDate()-climaPeriod);
  }

  var fmt = function(d){ return d.toISOString().slice(0,10); };
  var url = 'https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+
    '&daily=precipitation_sum,temperature_2m_min&start_date='+fmt(startDate)+'&end_date='+fmt(endDate)+'&timezone=America%2FSao_Paulo';

  q('suma-cards').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:#999;font-size:12px;"><i class="ti ti-loader" style="font-size:18px;display:block;margin-bottom:6px;"></i>Cargando...</div>';

  try {
    var res = await fetch(url);
    var data = await res.json();
    climaData = data.daily;
    renderClima();
  } catch(e) {
    q('suma-cards').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:#b83030;font-size:12px;">Error al cargar datos climáticos</div>';
  }
}

function renderClima() {
  if(!climaData) return;
  var prec = climaData.precipitation_sum || [];
  var dates = climaData.time || [];
  var tmin = climaData.temperature_2m_min || [];

  var total = prec.reduce(function(a,v){return a+(v||0);},0);
  var maxVal = Math.max.apply(null, prec.map(function(v){return v||0;}));
  var lastEvent = null, lastMm = 0;
  for(var i=prec.length-1;i>=0;i--){
    if(prec[i]>0.5){lastEvent=dates[i];lastMm=prec[i];break;}
  }
  var daysAgo = lastEvent ? Math.round((new Date()-new Date(lastEvent))/86400000) : null;

  // Heladas
  var heladas = tmin.filter(function(t){return t!=null&&t<0;}).length;

  // Summary cards
  q('suma-cards').innerHTML =
    '<div class="suma-card"><div class="sc-lbl">Acumulado</div><div class="sc-val">'+Math.round(total)+'<span style="font-size:10px;font-weight:400;color:#999;margin-left:2px;">mm</span></div><div class="sc-sub">'+prec.length+' días</div></div>'+
    '<div class="suma-card"><div class="sc-lbl">Último evento</div><div class="sc-val">'+(lastMm?Math.round(lastMm):'—')+'<span style="font-size:10px;font-weight:400;color:#999;margin-left:2px;">'+(lastMm?'mm':'')+'</span></div><div class="sc-sub">'+(daysAgo!=null?'hace '+daysAgo+'d':'sin datos')+'</div></div>'+
    '<div class="suma-card"><div class="sc-lbl">Heladas</div><div class="sc-val" style="color:'+(heladas>0?'#185FA5':'#18180f')+'">'+heladas+'<span style="font-size:10px;font-weight:400;color:#999;margin-left:2px;">días</span></div><div class="sc-sub">T° min &lt; 0°C</div></div>';

  // Bars
  var barsEl = q('clima-bars'); barsEl.innerHTML='';
  var step = Math.max(1, Math.floor(prec.length/30));
  var shown = [], shownDates = [];
  for(var i=0;i<prec.length;i+=step){
    shown.push(prec[i]||0);
    shownDates.push(dates[i]);
  }
  var maxShown = Math.max.apply(null,shown)||1;
  shown.forEach(function(v,i){
    var pct = Math.round(v/maxShown*100);
    var cls = v>20?'high':v>5?'mid':'low';
    var bar = document.createElement('div');
    bar.className = 'bar '+cls;
    bar.style.height = Math.max(2,pct)+'%';
    bar.title = shownDates[i]+': '+Math.round(v)+'mm';
    barsEl.appendChild(bar);
  });

  // Axis
  var axEl = q('clima-axis');
  if(shownDates.length>0){
    var fmt2=function(s){var p=s.split('-');return p[2]+'/'+p[1];};
    axEl.innerHTML='<span>'+fmt2(shownDates[0])+'</span>';
    if(shownDates.length>2)axEl.innerHTML+='<span>'+fmt2(shownDates[Math.floor(shownDates.length/2)])+'</span>';
    axEl.innerHTML+='<span>'+fmt2(shownDates[shownDates.length-1])+'</span>';
  }

  // Eventos destacados
  var eventos=[];
  for(var i=0;i<prec.length;i++){
    if(prec[i]>5) eventos.push({fecha:dates[i],mm:prec[i]});
  }
  eventos.sort(function(a,b){return b.mm-a.mm;});
  var evEl=q('clima-eventos'); evEl.innerHTML='';
  if(!eventos.length){evEl.innerHTML='<div style="text-align:center;padding:20px;color:#999;font-size:12px;">Sin eventos significativos en el período</div>';return;}
  eventos.slice(0,5).forEach(function(ev){
    var p=ev.fecha.split('-');
    var fechaStr=p[2]+'/'+p[1]+'/'+p[0];
    var card=document.createElement('div'); card.className='evento-card';
    card.innerHTML='<div class="evento-icon"><i class="ti ti-droplet" style="font-size:15px;color:#185FA5;"></i></div>'+
      '<div class="evento-info"><div class="evento-fecha">'+fechaStr+'</div><div class="evento-campos">'+(climaCampo==='all'?'Todos los campos':climaCampo)+'</div></div>'+
      '<div class="evento-mm">'+Math.round(ev.mm)+'<span>mm</span></div>';
    evEl.appendChild(card);
  });
}

// ── XLSX PARSER ───────────────────────────────────────────────
function isFinn(cell){return cell&&cell.s&&cell.s.fgColor&&cell.s.fgColor.rgb===FINN_COLOR;}
function normCult(v){var m={CC:'Cobertura',cc:'Cobertura',Car:'Carinata',car:'Carinata'};return v?m[String(v).trim()]||String(v).trim():null;}
function fmtDate(v){if(v==null)return null;if(typeof v==='number'&&v>40000){var d=XLSX.SSF.parse_date_code(v);if(d)return String(d.d).padStart(2,'0')+'/'+String(d.m).padStart(2,'0')+'/'+d.y;}var s=String(v).trim();if(s.includes('/')&&s.length<=6){var p=s.split('/');if(p.length===2){try{return p[0].padStart(2,'0')+'/'+p[1].padStart(2,'0')+'/2026';}catch(e){}}}return s||null;}
function sfn(v){var n=parseFloat(v);return isNaN(n)?null:n;}
function findCol(h0,h1,grp,col,fb){var exact=col.length<=3,cur=null;for(var i=0;i<h0.length;i++){if(h0[i])cur=String(h0[i]).trim();if(cur&&cur.toLowerCase().indexOf(grp.toLowerCase())>=0&&h1[i]){var b=String(h1[i]).trim().toLowerCase();if(exact?b===col.toLowerCase():b.indexOf(col.toLowerCase())>=0)return i;}}return fb!=null?fb:null;}
function herbCols(h0,h1,grp){var SKIP=['fecha','contratista','ha','kg','origen semilla','sembradora','%'],cur=null,cols=[],fechaCol=null,finnCol=null;for(var i=0;i<h0.length;i++){if(h0[i])cur=String(h0[i]).trim();if(cur===grp&&h1[i]){var h=String(h1[i]).trim();if(SKIP.indexOf(h.toLowerCase())>=0){if(h.toLowerCase()==='fecha'&&!fechaCol)fechaCol=i;}else{cols.push({idx:i,name:h});if(!finnCol)finnCol=i;}}}return{cols:cols,fechaCol:fechaCol,finnCol:finnCol};}
function herbProds(v,hc){var parts=[];hc.cols.forEach(function(c){var val=c.idx<v.length?v[c.idx]:null;if(val!=null&&val!==''&&!(val instanceof Date)){try{parseFloat(val);parts.push(c.name+' '+val+'L');}catch(e){}}});return parts.join(' + ')||null;}

  var BARB=herbCols(h0,h1,'Barbecho'),DG=herbCols(h0,h1,'Doble golpe'),REP=herbCols(h0,h1,'Repaso');
  var COL={cult:4,antec:3,siem_var:fc('siembra','variedad',null),siem_fecha:fc('siembra','fecha',null),re1_var:fc('resiembra','variedad',null),re1_fecha:fc('resiembra','fecha resiembra',fc('resiembra','fecha',null)),re1_ha:fc('resiembra','ha',null),bas_spt:fc('fertilización basal','spt',fc('fertilización basal','sps',null)),bas_kcl:fc('fertilización basal','kcl',null),bas_fosz:fc('fertilización basal','foszinc',null),bas_caso4:fc('fertilización basal','caso4',null),bas_fecha_p:fc('fertilización basal','fecha (p)',null),bas_fecha_k:fc('fertilización basal','fecha (k)',null),bas_fecha_s:fc('fertilización basal','fecha (s)',null),urea_siem:fc('fertilización siembra','urea',null),urea_fecha:fc('fertilización siembra','fecha',null),z22_kg:fc('fertilización z22','kg',null),z22_fecha:null,z30_kg:fc('fertilización z30','kg prom',null),z30_fecha:null,z33_kg:fc('fertilización z33','kg prom',null),z33_fecha:null,znf_dosis:fc('zinc foliar','dosis',null),znf_fecha:fc('zinc foliar','fecha',null),hum_dosis:fc('ácidos húmicos','dosis',null),hum_ha:fc('ácidos húmicos','ha',null),hum_fecha:fc('ácidos húmicos','fecha',null),f1_prod:fc('fungicida 1','producto',null),f1_fecha:fc('fungicida 1','fecha',null),f2_prod:fc('fungicida 2','producto',null),f2_fecha:fc('fungicida 2','fecha',null),f3_prod:fc('fungicida 3','producto',null),f3_fecha:fc('fungicida 3','fecha',null),v4_kg:fc('fertilización v4','kg',null),v4_fecha:fc('fertilización v4','fecha',null),v8_kg:fc('fertilización v8','kg',null),v8_fecha:fc('fertilización v8','fecha',null)};
  ['z22','z30','z33'].forEach(function(fn){var ff=[],cur=null;for(var i=0;i<=maxC;i++){if(h0[i])cur=String(h0[i]).toLowerCase();if(cur&&cur.indexOf(fn)>=0&&h1[i]&&String(h1[i]).toLowerCase().indexOf('fecha')>=0)ff.push(i);}COL[fn+'_fecha']=ff.length>=2?ff[1]:ff[0]||null;});
  for(var i=0;i<=maxC;i++){var s=String(h1[i]||'').toLowerCase();if(s.indexOf('cult invierno')>=0||s.indexOf('cult verano')>=0)COL.cult=i;if(s.indexOf('antecesor')>=0)COL.antec=i;}

      dg:{prod:herbProds(vArr,DG),fecha:fmtDate(DG.fechaCol!=null?gv(ri,DG.fechaCol):null),finn:FH(ri,DG),done:herbProds(vArr,DG)!=null},
      rep:{prod:herbProds(vArr,REP),fecha:fmtDate(REP.fechaCol!=null?gv(ri,REP.fechaCol):null),finn:FH(ri,REP),done:herbProds(vArr,REP)!=null},
      siem:{var:G(ri,'siem_var')?String(G(ri,'siem_var')):null,fecha:fmtDate(G(ri,'siem_fecha')),finn:FA(ri,['siem_var','siem_fecha'])},
      re1:{var:G(ri,'re1_var')?String(G(ri,'re1_var')):null,fecha:fmtDate(G(ri,'re1_fecha')),ha:re1ha,finn:FA(ri,['re1_var','re1_fecha'])},
      fert_bas:{spt:sfn(G(ri,'bas_spt')),spt_finn:GF(ri,'bas_spt'),kcl:sfn(G(ri,'bas_kcl')),kcl_finn:GF(ri,'bas_kcl'),fosz:sfn(G(ri,'bas_fosz')),fosz_finn:GF(ri,'bas_fosz'),caso4:sfn(G(ri,'bas_caso4')),caso4_finn:GF(ri,'bas_caso4'),fecha_p:fmtDate(G(ri,'bas_fecha_p')),fecha_k:fmtDate(G(ri,'bas_fecha_k')),fecha_s:fmtDate(G(ri,'bas_fecha_s'))},
      urea_siem:{kg:sfn(G(ri,'urea_siem')),fecha:fmtDate(G(ri,'urea_fecha')),finn:FA(ri,['urea_siem','urea_fecha'])},
      z22:{kg:sfn(G(ri,'z22_kg')),fecha:fmtDate(G(ri,'z22_fecha')),finn:FA(ri,['z22_kg','z22_fecha'])},
      z30:{kg:sfn(G(ri,'z30_kg')),fecha:fmtDate(G(ri,'z30_fecha')),finn:FA(ri,['z30_kg','z30_fecha'])},
      z33:{kg:sfn(G(ri,'z33_kg')),fecha:fmtDate(G(ri,'z33_fecha')),finn:FA(ri,['z33_kg','z33_fecha'])},
