*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#fff;color:#18180f;}
#splash{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}

.hdr{background:#fff;border-bottom:1px solid #e8e6de;padding:11px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.hdr-title{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.pills{display:flex;gap:4px;margin-left:auto;}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid #ccc;cursor:pointer;color:#666;}
.pill.on{background:#eeedfe;border-color:#534AB7;color:#534AB7;font-weight:600;}
.fstrip{padding:7px 16px;border-bottom:1px solid #e8e6de;display:flex;gap:5px;overflow-x:auto;align-items:center;}
.fc{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #ccc;cursor:pointer;color:#666;white-space:nowrap;}
.fc.on{border-color:#333;color:#333;background:#f8f7f3;font-weight:600;}
.campos{padding:10px 12px;display:flex;flex-direction:column;gap:8px;padding-bottom:40px;}
.ccard{border:1px solid #e8e6de;border-radius:12px;overflow:hidden;background:#fff;}
.chdr{padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;}
.mono{width:34px;height:34px;border-radius:8px;background:#f8f7f3;border:1px solid #e8e6de;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#666;}
.cn{font-size:13px;font-weight:600;}.cm{font-size:10px;color:#999;margin-top:1px;}
.ci{font-size:13px;color:#999;margin-left:auto;transition:transform .2s;}
.ci.open{transform:rotate(90deg);}
.llist{border-top:1px solid #e8e6de;display:none;}
.llist.open{display:block;}
.lrow{padding:8px 14px;display:flex;align-items:center;gap:7px;border-bottom:1px solid #e8e6de;flex-wrap:wrap;}
.lrow:last-child{border-bottom:none;}
.badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;}
.bTr{background:#E6F1FB;color:#185FA5;}.bCz{background:#FAEEDA;color:#633806;}
.bCeb{background:#EAF3DE;color:#3B6D11;}.bCob{background:#F1EFE8;color:#5F5E5A;}
.bSj1{background:#EEEDFE;color:#3C3489;}.bSj2{background:#E1EAFC;color:#2A4A8A;}
.bMz1{background:#FAECE7;color:#712B13;}.bMz2{background:#F5E0D8;color:#5C1E0A;}
.bCar{background:#F3E8F5;color:#5A1E63;}
</style>

var CLV={Sj1:'Soja 1',Sj2:'Soja 2',Mz1:'Maiz 1',Mz2:'Maiz 2',Cobertura:'Cob.'};
var BCL={Tr:'bTr',Cz:'bCz',Ceb:'bCeb',Cobertura:'bCob',Carinata:'bCar',Sj1:'bSj1',Sj2:'bSj2',Mz1:'bMz1',Mz2:'bMz2'};
var INI={Malacara:'ML','La Blanqueada':'LB','La Campana':'LC',Montecristo:'MC','Santa Rafaela':'SR','San Luis':'SL',Pereira:'PE'};
var AD=H, AC=null, SE='inv', FC='all', OC={};

function q(id){return document.getElementById(id);}
function safe(s){return String(s).replace(/'/g,"&#39;");}

function start(){
  var camps=Object.keys(AD).sort().reverse();
  AC=camps[0];
  q('splash').classList.add('hide');
  q('app').style.display='block';
  q('cpills').innerHTML=camps.map(function(c){
    return '<div class="pill'+(c===AC?' on':'')+'" onclick="setC(''+c+'',this)">'+c+'</div>';
  }).join('');
  render();
}

function setC(c,el){AC=c;document.querySelectorAll('.pill').forEach(function(x){x.classList.remove('on');});el.classList.add('on');render();}
function setS(s,el){SE=s;FC='all';document.querySelectorAll('.fstrip .fc').forEach(function(x){x.classList.remove('on');});el.classList.add('on');render();}
function setF(c,el){FC=c;document.querySelectorAll('#cchips .fc').forEach(function(x){x.classList.remove('on');});el.classList.add('on');render();}
function togC(campo){
  var k=campo+SE+AC;
  if(OC[k])delete OC[k]; else OC[k]=true;
  var ll=q('ll'+campo.replace(/\s/g,''));
  if(ll)ll.classList.toggle('open');
  var ci=q('ci'+campo.replace(/\s/g,''));
  if(ci)ci.classList.toggle('open');
}

function render(){
  var cd=AD[AC]; if(!cd)return;
  var src=SE==='inv'?cd.inv:cd.ver; if(!src)src=[];
  var rows=FC==='all'?src:src.filter(function(d){return d.cult===FC;});
  var CL=SE==='inv'?CLI:CLV;
  var cults=[];
  rows.forEach(function(d){if(d.cult&&cults.indexOf(d.cult)===-1)cults.push(d.cult);});
  cults.sort();
  q('cchips').innerHTML=[{v:'all',l:'Todos'}].concat(cults.map(function(c){return{v:c,l:CL[c]||c};}))
    .map(function(o){return '<div class="fc'+(FC===o.v?' on':'')+'" onclick="setF(''+o.v+'',this)">'+o.l+'</div>';}).join('');
  var grp={};
  rows.forEach(function(d){if(!grp[d.campo])grp[d.campo]=[];grp[d.campo].push(d);});
  var el=q('campos'); el.innerHTML='';
  Object.keys(grp).forEach(function(campo){
    var lotes=grp[campo];
    var ini=INI[campo]||campo.slice(0,2).toUpperCase();
    var totH=Math.round(lotes.reduce(function(a,r){return a+r.has;},0));
    var k=campo+SE+AC; var isOpen=!!OC[k];
    var cid='ll'+campo.replace(/\s/g,'');
    var iid='ci'+campo.replace(/\s/g,'');
    var loteHtml=lotes.map(function(d){
      var bc=BCL[d.cult]||'bCob';
      var cl=CL[d.cult]||d.cult||'?';
      return '<div class="lrow"><span style="font-size:11px;font-weight:600;color:#666;min-width:24px;">'+d.lote+'</span>'+
        '<span style="font-size:11px;color:#999;min-width:40px;">'+Math.round(d.has)+' ha</span>'+
        '<span class="badge '+bc+'">'+cl+'</span>'+
        '<span style="font-size:10px;color:#bbb;margin-left:auto;">'+(d.antec||'')+'</span></div>';
    }).join('');
    var div=document.createElement('div');
    div.className='ccard';
    div.innerHTML='<div class="chdr" onclick="togC(''+safe(campo)+'')">'+
      '<div class="mono">'+ini+'</div>'+
      '<div><div class="cn">'+campo+'</div><div class="cm">'+lotes.length+' lotes - '+totH.toLocaleString('es')+' ha</div></div>'+
      '<span id="'+iid+'" class="ci'+(isOpen?' open':'')+'" style="font-size:20px;margin-left:auto;">'+(isOpen?'&#8964;':'&#8250;')+'</span>'+
    '</div><div class="llist'+(isOpen?' open':'')+'" id="'+cid+'">'+loteHtml+'</div>';
    el.appendChild(div);
  });
}

start();
