<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#18180f;min-height:100vh;}
#splash{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:200;}
#splash.hide{display:none;}
.sp-img{width:110px;height:auto;}
.sp-sub{font-size:12px;color:#999;}
.hdr{background:#fff;border-bottom:1px solid #e8e6de;padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.hdr-logo{height:26px;width:auto;}
.hdr-r{display:flex;gap:5px;align-items:center;margin-left:auto;}
.cpill{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid #ccc;cursor:pointer;color:#666;font-weight:500;}
.cpill.on{background:#eeedfe;border-color:#534AB7;color:#534AB7;font-weight:600;}
.sync{font-size:10px;color:#1a8a5a;display:flex;align-items:center;gap:3px;}
.ibtn{padding:5px;border-radius:6px;cursor:pointer;color:#666;font-size:16px;border:none;background:transparent;}
.fstrip{background:#fff;border-bottom:1px solid #e8e6de;padding:7px 16px;display:flex;gap:5px;overflow-x:auto;align-items:center;scrollbar-width:none;}
.fstrip::-webkit-scrollbar{display:none;}
.fl{font-size:9px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-right:3px;white-space:nowrap;flex-shrink:0;}
.fchip{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #ccc;cursor:pointer;color:#666;white-space:nowrap;flex-shrink:0;}
.fchip.on{border-color:#333;color:#333;background:#f8f7f3;font-weight:600;}
.fsep{width:1px;height:16px;background:#e8e6de;margin:0 3px;flex-shrink:0;}
.mwrap{background:#fff;border-bottom:1px solid #e8e6de;padding:8px 16px;overflow-x:auto;scrollbar-width:none;}
.mwrap::-webkit-scrollbar{display:none;}
.metrics{display:flex;gap:6px;min-width:max-content;}
.metric{background:#f8f7f3;border-radius:7px;padding:7px 10px;min-width:84px;}
.ml{font-size:9px;color:#999;margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
.mv{font-size:17px;font-weight:600;}
.ms{font-size:9px;color:#999;margin-top:1px;white-space:nowrap;}
.mbar{width:100%;height:3px;border-radius:2px;background:#e8e6de;margin-top:4px;}
.mfill{height:3px;border-radius:2px;}
.campos{padding:10px 12px;display:flex;flex-direction:column;gap:8px;padding-bottom:50px;}
.ccard{background:#fff;border:1px solid #e8e6de;border-radius:12px;overflow:hidden;}
.chdr{padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none;}
.chdr:active{background:#f8f7f3;}
.mono{width:34px;height:34px;border-radius:8px;background:#f8f7f3;border:1px solid #e8e6de;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#666;flex-shrink:0;}
.cn{font-size:13px;font-weight:600;}.cm{font-size:10px;color:#999;margin-top:1px;}
.chev{font-size:13px;color:#999;margin-left:auto;transition:transform .2s;}
.chev.open{transform:rotate(90deg);}
.llist{border-top:1px solid #e8e6de;display:none;}
.llist.open{display:block;}
.lrow{border-bottom:1px solid #e8e6de;cursor:pointer;}
.lrow:last-child{border-bottom:none;}
.lhdr{display:flex;align-items:flex-start;gap:7px;padding:8px 14px;flex-wrap:wrap;}
.lhdr:active{background:#f8f7f3;}
.lnum{font-size:11px;font-weight:600;color:#666;min-width:22px;margin-top:2px;}
.lhas{font-size:11px;color:#999;min-width:38px;margin-top:2px;}
.cbadge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.bTr{background:#E6F1FB;color:#185FA5;}.bCz{background:#FAEEDA;color:#633806;}
.bCeb{background:#EAF3DE;color:#3B6D11;}.bCob{background:#F1EFE8;color:#5F5E5A;}
.bCar{background:#F3E8F5;color:#5A1E63;}.bSj1{background:#EEEDFE;color:#3C3489;}
.bSj2{background:#E1EAFC;color:#2A4A8A;}.bMz1{background:#FAECE7;color:#712B13;}
.bMz2{background:#F5E0D8;color:#5C1E0A;}
.re-tag{font-size:10px;background:#fdf3e0;color:#c47a12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap;}
.rot{display:flex;gap:2px;align-items:center;margin-left:auto;}
.ri{display:flex;flex-direction:column;align-items:center;gap:1px;}
.rl{font-size:8px;color:#999;white-space:nowrap;}
.ri.cur .rl{color:#534AB7;font-weight:700;}
.rb{font-size:10px;padding:1px 4px;border-radius:3px;font-weight:500;}
.rarr{font-size:9px;color:#ccc;margin-top:7px;}
.ldet{display:none;background:#f8f7f3;border-top:1px solid #e8e6de;}
.ldet.open{display:block;}
.dbanner{padding:8px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid #e8e6de;background:#fff;}
.dvar{font-size:12px;font-weight:600;}
.re-pb{display:flex;align-items:center;gap:8px;padding:5px 14px 0;}
.re-pbl{font-size:10px;color:#999;}
.re-pbg{flex:1;height:4px;border-radius:2px;background:#e8e6de;}
.re-pf{height:4px;border-radius:2px;background:#c47a12;}
.re-pv{font-size:11px;font-weight:600;color:#c47a12;min-width:28px;text-align:right;}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid #e8e6de;}
@media(max-width:480px){.sgrid{grid-template-columns:1fr;}}
.sec{padding:10px 12px;border-right:1px solid #e8e6de;}
.sec:last-child{border-right:none;}
@media(max-width:480px){.sec{border-right:none;border-bottom:1px solid #e8e6de;}.sec:last-child{border-bottom:none;}}
.st{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#999;margin-bottom:7px;display:flex;align-items:center;gap:4px;}
.li{display:flex;align-items:flex-start;gap:5px;margin-bottom:3px;padding:4px 6px;border-radius:6px;}
.li.done{background:#fff;}.li.pend{opacity:.3;}.li.finn{background:#e8eef8;}
.li i{font-size:13px;margin-top:1px;flex-shrink:0;}
.li.done i,.li.finn i{color:#1a8a5a;}.li.pend i{color:#ccc;}.li.re i{color:#c47a12;}
.lb{flex:1;min-width:0;}
.ln{font-size:11px;font-weight:600;}
.ld{font-size:10px;color:#666;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lf{font-size:10px;color:#1a8a5a;margin-top:1px;}
.ff{display:inline-flex;align-items:center;vertical-align:middle;margin-left:3px;}
.ff img{width:13px;height:13px;object-fit:contain;opacity:.85;}
.fsec{padding:10px 12px;}
.ftit{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#999;margin-bottom:8px;display:flex;align-items:center;gap:4px;}
.fgrp{margin-bottom:10px;}
.fgl{font-size:10px;color:#999;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid #e8e6de;font-weight:500;}
.frow{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:5px;}
.fc{border-radius:7px;padding:7px 8px;background:#fff;}
.fc.done{border-left:2px solid #1a8a5a;}.fc.pend{border-left:2px solid #e8e6de;opacity:.38;}
.fc.finn{border-left:2px solid #002060;background:#e8eef8;}
.fc.total{background:#eeedfe;border-left:2px solid #534AB7;}
.fcl{font-size:9px;color:#999;margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
.fc.total .fcl{color:#534AB7;}
.fcv{font-size:13px;font-weight:600;}
.fc.total .fcv{color:#534AB7;}
.fcu{font-size:9px;font-weight:400;color:#999;margin-left:1px;}
.fc.total .fcu{color:#534AB7;}
.fcd{font-size:9px;color:#1a8a5a;margin-top:2px;}
.hbar{width:100%;height:3px;border-radius:2px;background:#e8e6de;margin-top:3px;}
.hbarf{height:3px;border-radius:2px;background:#1a8a5a;}
.empty{padding:36px;text-align:center;color:#999;font-size:13px;}
</style>
</head>

async function updateBg(){
  if(typeof XLSX==='undefined')return;
  var now=new Date();
  for(var y=now.getFullYear()+2;y>=2024;y--){
    var yy=String(y).slice(2),yp=String(y+1).slice(2),camp=yy+'-'+yp;
    try{
      var ctrl=new AbortController();setTimeout(function(){ctrl.abort();},12000);
      var res=await fetch(RAW+'/Planilla_labores_'+yy+'-'+yp+'.xlsx',{cache:'no-store',signal:ctrl.signal});
      if(!res.ok)continue;
      var buf=await res.arrayBuffer(),wb=XLSX.read(buf,{cellStyles:true});
      AD[camp]={inv:parseSheet(wb,'Invierno'),ver:parseSheet(wb,'Verano')};
      var camps=Object.keys(AD).sort().reverse();AC=camps[0];
      buildPills(camps);render();
      q('synctxt').textContent=camp;q('sync').style.display='flex';
      break;
    }catch(e){continue;}
  }
}
