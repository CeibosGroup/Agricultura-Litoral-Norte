<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Agricultura · Litoral Norte</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" onload="xlsxReady=true;tryStart()" onerror="xlsxFallback()"></script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a4a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-title" content="LN Agro">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:#fff;color:#18180f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;}
:root{
  --brd:#e8e6de;--brd2:#ccc9be;
  --tx:#18180f;--tx2:#6b6955;--tx3:#9e9c8a;
  --surf:#fff;--surf2:#f8f7f3;--surf3:#f2f0eb;
  --green:#1a8a5a;--gbg:#e8f5ee;
  --amber:#c47a12;--abg:#fdf3e0;
  --red:#b83030;--rbg:#fceaea;
  --blue:#002060;--bbg:#e8eef8;
  --purple:#534AB7;--pbg:#EEEDFE;
  --r:12px;--rs:7px;
}


/* LOGO */
.sp-logo-img{width:120px;height:auto;margin-bottom:4px;}
.hdr-logo{height:28px;width:auto;}

/* SPLASH */
#splash{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:200;transition:opacity .3s;}
#splash.hide{opacity:0;pointer-events:none;}
.sp-logo{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);}
.sp-title{font-size:20px;font-weight:700;color:var(--tx);letter-spacing:-.01em;}
.sp-sub{font-size:12px;color:var(--tx3);}
.sp-status{font-size:12px;color:var(--tx2);display:flex;align-items:center;gap:8px;}
.spin{width:16px;height:16px;border:2px solid var(--brd);border-top-color:var(--purple);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.sp-err{background:var(--rbg);color:var(--red);padding:10px 16px;border-radius:8px;font-size:12px;max-width:320px;text-align:center;display:none;}
.sp-retry{margin-top:4px;padding:8px 20px;background:var(--purple);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;display:none;}

/* HEADER */
.hdr{background:#fff;border-bottom:1px solid var(--brd);padding:11px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.hdr-title{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.hdr-title span{color:var(--tx3);font-weight:500;}
.hdr-r{display:flex;gap:5px;align-items:center;margin-left:auto;}
.cpill{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--brd2);cursor:pointer;color:var(--tx2);font-weight:500;transition:all .15s;white-space:nowrap;}
.cpill.on{background:var(--pbg);border-color:var(--purple);color:var(--purple);}
.ibtn{padding:5px 6px;border-radius:7px;cursor:pointer;color:var(--tx2);font-size:16px;border:none;background:transparent;line-height:1;}
.ibtn:hover{background:var(--surf2);}
.sync-ok{font-size:10px;color:var(--green);display:flex;align-items:center;gap:3px;white-space:nowrap;}
.sync-ok i{font-size:12px;}

/* FILTERS */
.fstrip{background:#fff;border-bottom:1px solid var(--brd);padding:7px 16px;display:flex;gap:5px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;align-items:center;}
.fstrip::-webkit-scrollbar{display:none;}
.fl{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-right:3px;white-space:nowrap;}
.fchip{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--brd2);cursor:pointer;color:var(--tx2);white-space:nowrap;font-weight:500;flex-shrink:0;transition:all .15s;}
.fchip.on{border-color:var(--tx);color:var(--tx);background:var(--surf2);}
.fsep{width:1px;height:16px;background:var(--brd);margin:0 3px;flex-shrink:0;}

/* ALERTS */
.alerts{background:#fff;border-bottom:1px solid var(--brd);padding:6px 16px;min-height:34px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.al{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:3px;margin-right:2px;white-space:nowrap;}
.ap{font-size:11px;padding:2px 8px;border-radius:20px;display:flex;align-items:center;gap:4px;white-space:nowrap;font-weight:500;}
.ap.urg{background:var(--rbg);color:var(--red);}
.ap.info{background:var(--pbg);color:var(--purple);}
.ap i{font-size:10px;}
.no-al{font-size:11px;color:var(--tx3);display:flex;align-items:center;gap:4px;}

/* METRICS */
.mwrap{background:#fff;border-bottom:1px solid var(--brd);padding:9px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.mwrap::-webkit-scrollbar{display:none;}
.metrics{display:flex;gap:7px;min-width:max-content;}
.metric{background:var(--surf2);border-radius:var(--rs);padding:8px 11px;min-width:88px;flex-shrink:0;}
.ml{font-size:9px;color:var(--tx3);margin-bottom:3px;display:flex;align-items:center;gap:3px;white-space:nowrap;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.ml i{font-size:11px;}
.mv{font-size:18px;font-weight:600;line-height:1.1;color:var(--tx);}
.ms{font-size:9px;color:var(--tx3);margin-top:2px;white-space:nowrap;}
.mbar{width:100%;height:3px;border-radius:2px;background:var(--brd);margin-top:5px;}
.mfill{height:3px;border-radius:2px;}

/* CAMPOS */
.campos{padding:10px 12px;display:flex;flex-direction:column;gap:8px;padding-bottom:56px;}
.ccard{background:#fff;border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;}
.chdr{padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none;-webkit-user-select:none;}
.chdr:active{background:var(--surf2);}
.mono{width:34px;height:34px;border-radius:8px;background:var(--surf2);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--tx2);flex-shrink:0;}
.cn{font-size:13px;font-weight:600;}
.cm{font-size:10px;color:var(--tx3);margin-top:1px;}
.cr{margin-left:auto;display:flex;gap:6px;align-items:center;}
.abadge{font-size:10px;background:var(--rbg);color:var(--red);padding:2px 7px;border-radius:20px;display:flex;align-items:center;gap:3px;font-weight:600;}
.chev{font-size:13px;color:var(--tx3);transition:transform .2s;margin-left:2px;}
.chev.open{transform:rotate(90deg);}

/* LOTES */
.llist{border-top:1px solid var(--brd);display:none;}
.llist.open{display:block;}
.lrow{border-bottom:1px solid var(--brd);}
.lrow:last-child{border-bottom:none;}
.lhdr{display:flex;align-items:flex-start;gap:7px;padding:9px 14px;cursor:pointer;flex-wrap:wrap;}
.lhdr:active{background:var(--surf2);}
.lnum{font-size:11px;font-weight:600;color:var(--tx2);min-width:24px;margin-top:2px;}
.lhas{font-size:11px;color:var(--tx3);min-width:42px;margin-top:2px;}
.cbadge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.b-Tr{background:#E6F1FB;color:#185FA5;}.b-Cz{background:#FAEEDA;color:#633806;}.b-Ceb{background:#EAF3DE;color:#3B6D11;}
.b-Cobertura,.b-CC{background:#F1EFE8;color:#5F5E5A;}.b-Carinata{background:#F3E8F5;color:#5A1E63;}
.b-Sj1{background:#EEEDFE;color:#3C3489;}.b-Sj2{background:#E1EAFC;color:#2A4A8A;}
.b-Mz1{background:#FAECE7;color:#712B13;}.b-Mz2{background:#F5E0D8;color:#5C1E0A;}
.re-tag{font-size:10px;background:var(--abg);color:var(--amber);padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap;}
.lrow-al{display:flex;gap:4px;flex-wrap:wrap;width:100%;margin-top:4px;}
.la{font-size:10px;padding:2px 7px;border-radius:3px;display:flex;align-items:center;gap:3px;white-space:nowrap;font-weight:500;}
.la i{font-size:10px;}
.la.urg{background:var(--rbg);color:var(--red);}.la.info{background:var(--pbg);color:var(--purple);}
.rot{display:flex;gap:2px;align-items:center;margin-left:auto;}
.ri{display:flex;flex-direction:column;align-items:center;gap:1px;}
.rl{font-size:8px;color:var(--tx3);white-space:nowrap;}
.ri.cur .rl{color:var(--purple);font-weight:700;}
.rb{font-size:10px;padding:1px 4px;border-radius:3px;font-weight:500;}
.rarr{font-size:9px;color:var(--brd2);margin-top:7px;}

/* DETAIL */
.ldet{display:none;background:var(--surf2);border-top:1px solid var(--brd);}
.ldet.open{display:block;}
.dbanner{padding:9px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--brd);background:#fff;}
.dvar{font-size:12px;font-weight:600;}
.re-pb{display:flex;align-items:center;gap:8px;padding:6px 14px 0;}
.re-pbl{font-size:10px;color:var(--tx3);}.re-pbg{flex:1;height:4px;border-radius:2px;background:var(--brd);}
.re-pf{height:4px;border-radius:2px;background:var(--amber);}.re-pv{font-size:11px;font-weight:600;color:var(--amber);min-width:28px;text-align:right;}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--brd);}
@media(max-width:480px){.sgrid{grid-template-columns:1fr;}}
.sec{padding:11px 13px;border-right:1px solid var(--brd);}
.sec:last-child{border-right:none;}
@media(max-width:480px){.sec{border-right:none;border-bottom:1px solid var(--brd);}.sec:last-child{border-bottom:none;}}
.st{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:8px;display:flex;align-items:center;gap:4px;}
.li{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;padding:5px 7px;border-radius:var(--rs);}
.li.done{background:#fff;}.li.pend{opacity:.3;}.li.finn{background:var(--bbg);}
.li i{font-size:13px;margin-top:1px;flex-shrink:0;}
.li.done i,.li.finn i{color:var(--green);}.li.pend i{color:var(--brd2);}.li.re i{color:var(--amber);}
.lb{flex:1;min-width:0;}
.ln{font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.ld{font-size:10px;color:var(--tx2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lf{font-size:10px;color:var(--green);margin-top:1px;}
.ff{display:inline-flex;align-items:center;vertical-align:middle;margin-left:3px;}.ff img{width:14px;height:14px;object-fit:contain;opacity:.85;}
.fsec{padding:11px 13px;}
.ftit{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:9px;display:flex;align-items:center;gap:4px;}
.fgrp{margin-bottom:10px;}
.fgl{font-size:10px;color:var(--tx3);margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid var(--brd);font-weight:500;}
.frow{display:grid;grid-template-columns:repeat(auto-fill,minmax(98px,1fr));gap:5px;}
.fc{border-radius:var(--rs);padding:7px 9px;background:#fff;}
.fc.done{border-left:2px solid var(--green);}.fc.pend{border-left:2px solid var(--brd);opacity:.38;}
.fc.finn{border-left:2px solid var(--blue);background:var(--bbg);}.fc.total{background:var(--pbg);border-left:2px solid var(--purple);}
.fcl{font-size:9px;color:var(--tx3);margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;display:flex;align-items:center;gap:3px;}
.fc.total .fcl{color:var(--purple);}.fcv{font-size:14px;font-weight:600;color:var(--tx);}
.fc.total .fcv{color:var(--purple);}.fcu{font-size:9px;font-weight:400;color:var(--tx3);margin-left:1px;}
.fc.total .fcu{color:var(--purple);}.fcd{font-size:9px;color:var(--green);margin-top:2px;}.fcs{font-size:9px;color:var(--tx3);margin-top:1px;}
.hbar{width:100%;height:3px;border-radius:2px;background:var(--brd);margin-top:4px;}.hbarf{height:3px;border-radius:2px;background:var(--green);}
.empty{padding:36px 16px;text-align:center;color:var(--tx3);font-size:13px;}
.empty i{font-size:30px;display:block;margin-bottom:8px;}
</style>
</head>
<body>

<!-- SPLASH / LOADING -->
<div id="splash">
  <img src="LOGO.png" class="sp-logo-img" alt="Agricultura Litoral Norte">
  <div class="sp-sub">Seguimiento de labores · Ceibos Group</div>
</div>

<div id="app" style="display:none;">

  <div class="alerts" id="alerts"></div>
  <div class="mwrap"><div class="metrics" id="metrics"></div></div>
  <div class="campos" id="campos"></div>
</div>

function initApp(manual=false){
  try{
    if(manual){
      document.getElementById('splash').classList.remove('hide');
      document.getElementById('app').style.display='none';
    }

    // Load historic data (embedded)
    allData = JSON.parse(JSON.stringify(HISTORIC));
    Object.values(allData).forEach(cd=>{
      (cd.inv||[]).forEach(d=>{ HAS_REF[`${d.campo}|${d.lote}`]=d.has; });
    });

    const camps = Object.keys(allData).sort().reverse();
    activeCamp = camps[0];

    // Hide splash, show app
    const splash = document.getElementById('splash');
    const app = document.getElementById('app');
    splash.style.display='none';
    app.style.display='block';

    document.getElementById('sync-txt').textContent = activeCamp;
    document.getElementById('sync-ok').style.display='flex';

    buildCampPills(camps);
    render();

    // Try GitHub update in background
    updateFromGithub();

  } catch(e){
    // Show error on splash so we can debug
    document.getElementById('splash').innerHTML += 
      `<div style="color:red;font-size:12px;padding:16px;max-width:320px;word-break:break-all;">ERROR: ${e.message}<br>${e.stack||''}</div>`;
  }
}

async function updateFromGithub(){
  const RAW = 'https://raw.githubusercontent.com/CeibosGroup/Agricultura-Litoral-Norte/main';
  const now = new Date();
  for(let y = now.getFullYear()+2; y >= 2024; y--){
    const yy = String(y).slice(2);
    const yp = String(y+1).slice(2);
    const fname = `Planilla_labores_${yy}-${yp}.xlsx`;
    const camp = `${yy}-${yp}`;
    try{
      const ctrl = new AbortController();
      const tid = setTimeout(()=>ctrl.abort(), 8000);
      const res = await fetch(`${RAW}/${fname}`, {cache:'no-store', signal:ctrl.signal});
      clearTimeout(tid);
      if(!res.ok) continue;
      const buf = await res.arrayBuffer();
      const wb = XLSX.read(buf,{cellStyles:true});
      allData[camp]={
        inv: parseSheet(wb,'Invierno',camp),
        ver: parseSheet(wb,'Verano',camp),
      };
      (allData[camp].inv||[]).forEach(d=>{HAS_REF[`${d.campo}|${d.lote}`]=d.has;});
      const camps = Object.keys(allData).sort().reverse();
      activeCamp = camps[0];
      buildCampPills(camps);
      render();
      document.getElementById('sync-txt').textContent = camp + ' ↑';
      break;
    } catch(e){ continue; }
  }
}

// ── PARSER ────────────────────────────────────────────────────
function isFinn(cell){ return cell?.s?.fgColor?.rgb===FINN_COLOR; }
function normCult(v){ if(!v) return null; const s=String(v).trim(); return CULT_NORM[s]||s; }
function fmtDate(v){
  if(v==null) return null;
  if(typeof v==='number'&&v>40000){
    const d=XLSX.SSF.parse_date_code(v);
    if(d) return `${String(d.d).padStart(2,'0')}/${String(d.m).padStart(2,'0')}/${d.y}`;
  }
  const s=String(v).trim();
  if(s.includes('/')&&s.length<=6){const p=s.split('/');if(p.length===2){try{return `${p[0].padStart(2,'0')}/${p[1].padStart(2,'0')}/2026`;}catch{}}}
  return s||null;
}
function sfn(v){const n=parseFloat(v);return isNaN(n)?null:n;}
function findCol(h0,h1,grp,col){
  let cur=null;
  for(let i=0;i<h0.length;i++){
    if(h0[i]) cur=String(h0[i]).toLowerCase();
    if(cur&&cur.includes(grp.toLowerCase())&&h1[i]&&String(h1[i]).toLowerCase().includes(col.toLowerCase())) return i;
  }
  return null;
}

function parseSheet(wb,sheetName,camp){
  if(!wb.SheetNames.includes(sheetName)) return [];
  const ws=wb.Sheets[sheetName];
  if(!ws||!ws['!ref']) return [];
  const rng=XLSX.utils.decode_range(ws['!ref']);
  const maxR=rng.e.r,maxC=rng.e.c;
  const gc=(r,c)=>ws[XLSX.utils.encode_cell({r,c})];
  const gv=(r,c)=>gc(r,c)?.v;
  const gf=(r,c)=>isFinn(gc(r,c));
  const h0=[],h1=[];
  for(let c=0;c<=maxC;c++){h0.push(gv(0,c));h1.push(gv(1,c));}
  const fc=(g,c,fb=null)=>findCol(h0,h1,g,c)??fb;
  const isInv=sheetName==='Invierno';

  // Find herbicide product columns by group
  // Returns {cols:[{idx,name}], fechaCol, finnCol}
  function herbCols(groupName){
    const SKIP_H2=['Fecha','Contratista','Ha','%','fecha','contratista'];
    let cur=null, cols=[], fechaCol=null, firstProdCol=null;
    for(let i=0;i<=maxC;i++){
      if(h0[i]) cur=String(h0[i]).trim();
      if(cur===groupName && h1[i]){
        const h=String(h1[i]).trim();
        if(SKIP_H2.includes(h)){
          if(h==='Fecha'&&!fechaCol) fechaCol=i;
        } else {
          cols.push({idx:i,name:h});
          if(!firstProdCol) firstProdCol=i;
        }
      }
    }
    return {cols, fechaCol, finnCol:firstProdCol};
  }

  const BARB=herbCols('Barbecho');
  const DG=herbCols('Doble golpe');
  const REP=herbCols('Repaso');

  // Build product string from herb cols (only cols with values)
  function herbProds(r, hc){
    const parts=[];
    hc.cols.forEach(({idx,name})=>{
      const v=gv(r,idx);
      if(v!=null&&v!=='') parts.push(`${name} ${v}L`);
    });
    return parts.join(' + ')||null;
  }
  function herbFecha(r,hc){ return fmtDate(hc.fechaCol!=null?gv(r,hc.fechaCol):null); }
  function herbFinn(r,hc){ return hc.finnCol!=null?gf(r,hc.finnCol):false; }
  function herbDone(r,hc){ return hc.cols.some(({idx})=>gv(r,idx)!=null); }

  let COL={};
  if(isInv){
    COL={
      siem_var:fc('siembra','variedad'),siem_fecha:fc('siembra','fecha siembra',fc('siembra','fecha')),
      re1_var:fc('resiembra','variedad'),re1_fecha:fc('resiembra','fecha resiembra',fc('resiembra','fecha')),re1_ha:fc('resiembra','ha'),
      bas_spt:fc('fertilización basal','spt',fc('fertilización basal','sps')),bas_kcl:fc('fertilización basal','kcl'),
      bas_fosz:fc('fertilización basal','foszinc'),bas_caso4:fc('fertilización basal','caso4'),bas_fecha_p:fc('fertilización basal','fecha (p)'),bas_fecha_k:fc('fertilización basal','fecha (k)'),bas_fecha_s:fc('fertilización basal','fecha (s)'),
      urea_siem:fc('fertilización siembra','urea'),urea_fecha:fc('fertilización siembra','fecha'),
      z22_kg:fc('fertilización z22','kg'),z22_fecha:fc('fertilización z22','fecha'),
      z30_kg:fc('fertilización z30','kg prom'),z30_fecha:fc('fertilización z30','fecha'),
      z33_kg:fc('fertilización z33','kg prom'),z33_fecha:fc('fertilización z33','fecha'),
      znf_dosis:fc('zinc foliar','dosis'),znf_fecha:fc('zinc foliar','fecha'),
      hum_dosis:fc('ácidos húmicos','dosis'),hum_ha:fc('ácidos húmicos','ha'),hum_fecha:fc('ácidos húmicos','fecha'),
      f1_prod:fc('fungicida 1','producto'),f1_fecha:fc('fungicida 1','fecha'),
      f2_prod:fc('fungicida 2','producto'),f2_fecha:fc('fungicida 2','fecha'),
      cult:3,antec:null
    };
    for(let i=0;i<=maxC;i++){const s=String(h1[i]||'').toLowerCase();if(s.includes('cult invierno'))COL.cult=i;if(s.includes('antecesor'))COL.antec=i;}
  } else {
    COL={
      cult:3,
      siem_var:fc('siembra','variedad'),siem_fecha:fc('siembra','fecha siembra',fc('siembra','fecha')),
      re1_var:fc('resiembra','variedad'),re1_fecha:fc('resiembra','fecha'),re1_ha:fc('resiembra','ha'),
      urea_siem:fc('fertilización siembra','urea'),urea_fecha:fc('fertilización siembra','fecha'),
      v4_kg:fc('fertilización v4','kg'),v4_fecha:fc('fertilización v4','fecha'),
      v8_kg:fc('fertilización v8','kg'),v8_fecha:fc('fertilización v8','fecha'),
      znf_dosis:fc('zinc','dosis'),znf_fecha:fc('zinc','fecha'),
      f1_prod:fc('fungicida 1','producto'),f1_fecha:fc('fungicida 1','fecha'),
      f2_prod:fc('fungicida 2','producto'),f2_fecha:fc('fungicida 2','fecha'),
    };
    for(let i=0;i<=maxC;i++){const s=String(h1[i]||'').toLowerCase();if(s.includes('cultivo verano')||s==='cult')COL.cult=i;}
  }

  const G=(r,k)=>{const c=COL[k];return(c!=null&&c<=maxC)?gv(r,c):null;};
  const GF=(r,k)=>{const c=COL[k];return(c!=null&&c<=maxC)?gf(r,c):false;};
  const FA=(r,...ks)=>ks.some(k=>GF(r,k));
  const lotes=[];let campo=null;

  for(let ri=2;ri<=maxR;ri++){
    const v0=gv(ri,0);if(v0)campo=String(v0).trim();
    if(!campo||SKIP_CAMPOS.has(campo))continue;
    if(gv(ri,1)==null)continue;
    const lote=String(gv(ri,1));
    const hasRaw=sfn(gv(ri,2))||0;
    const hk=`${campo}|${lote}`;
    const has=HAS_REF[hk]||hasRaw;
    const re1haRaw=G(ri,'re1_ha');
    const re1ha=(typeof re1haRaw==='number'&&re1haRaw<10000)?re1haRaw:null;

    const barbProd=herbProds(ri,BARB);
    const barbFecha=herbFecha(ri,BARB);
    const barbDone=herbDone(ri,BARB);
    const dgProd=herbProds(ri,DG);
    const dgFecha=herbFecha(ri,DG);
    const dgDone=herbDone(ri,DG);
    const repProd=herbProds(ri,REP);
    const repFecha=herbFecha(ri,REP);
    const repDone=herbDone(ri,REP);

    const d={
      campo,lote,has:Math.round(has*100)/100,
      cult:normCult(G(ri,'cult')),antec:normCult(G(ri,isInv?'antec':null)),
      barb:{prod:barbProd,fecha:barbFecha,finn:herbFinn(ri,BARB),done:barbDone},
      dg:{prod:dgProd,fecha:dgFecha,finn:herbFinn(ri,DG),done:dgDone},
      rep:{prod:repProd,fecha:repFecha,finn:herbFinn(ri,REP),done:repDone},
      siem:{var:G(ri,'siem_var')!=null?String(G(ri,'siem_var')):null,fecha:fmtDate(G(ri,'siem_fecha')),finn:FA(ri,'siem_var','siem_fecha')},
      re1:{var:G(ri,'re1_var')!=null?String(G(ri,'re1_var')):null,fecha:fmtDate(G(ri,'re1_fecha')),ha:re1ha,finn:FA(ri,'re1_var','re1_fecha')},
      fert_bas:{spt:sfn(G(ri,'bas_spt')),spt_finn:GF(ri,'bas_spt'),kcl:sfn(G(ri,'bas_kcl')),kcl_finn:GF(ri,'bas_kcl'),fosz:sfn(G(ri,'bas_fosz')),fosz_finn:GF(ri,'bas_fosz'),caso4:sfn(G(ri,'bas_caso4')),caso4_finn:GF(ri,'bas_caso4'),fecha_p:fmtDate(G(ri,'bas_fecha_p')),fecha_k:fmtDate(G(ri,'bas_fecha_k')),fecha_s:fmtDate(G(ri,'bas_fecha_s'))},
      urea_siem:{kg:sfn(G(ri,'urea_siem')),fecha:fmtDate(G(ri,'urea_fecha')),finn:FA(ri,'urea_siem','urea_fecha')},
      z22:{kg:sfn(G(ri,'z22_kg')),fecha:fmtDate(G(ri,'z22_fecha')),finn:FA(ri,'z22_kg','z22_fecha')},
      z30:{kg:sfn(G(ri,'z30_kg')),fecha:fmtDate(G(ri,'z30_fecha')),finn:FA(ri,'z30_kg','z30_fecha')},
      z33:{kg:sfn(G(ri,'z33_kg')),fecha:fmtDate(G(ri,'z33_fecha')),finn:FA(ri,'z33_kg','z33_fecha')},
      znf:{dosis:sfn(G(ri,'znf_dosis')),fecha:fmtDate(G(ri,'znf_fecha')),finn:FA(ri,'znf_dosis','znf_fecha')},
      hum:{dosis:sfn(G(ri,'hum_dosis')),ha:sfn(G(ri,'hum_ha')),fecha:fmtDate(G(ri,'hum_fecha')),finn:FA(ri,'hum_dosis','hum_ha')},
      f1:{prod:G(ri,'f1_prod')!=null?String(G(ri,'f1_prod')):null,fecha:fmtDate(G(ri,'f1_fecha')),finn:FA(ri,'f1_prod','f1_fecha')},
      f2:{prod:G(ri,'f2_prod')!=null?String(G(ri,'f2_prod')):null,fecha:fmtDate(G(ri,'f2_fecha')),finn:FA(ri,'f2_prod','f2_fecha')},
    };
    if(!isInv){
      d.v4={kg:sfn(G(ri,'v4_kg')),fecha:fmtDate(G(ri,'v4_fecha')),finn:FA(ri,'v4_kg','v4_fecha')};
      d.v8={kg:sfn(G(ri,'v8_kg')),fecha:fmtDate(G(ri,'v8_fecha')),finn:FA(ri,'v8_kg','v8_fecha')};
    }
    lotes.push(d);
  }
  return lotes;
}

// ── ALERTS ────────────────────────────────────────────────────
function getLoteAlerts(d){
  const a=[];
  if(season!=='inv'||d.cult!=='Cz')return a;
  // Use resiembra date if re >= 50% of lote, else use siembra
  let refFecha=d.siem?.fecha;
  if(d.re1?.fecha&&d.re1?.ha&&d.has){
    const rePct=Math.round(d.re1.ha/d.has*100);
    if(rePct>=50) refFecha=d.re1.fecha;
  }
  if(!refFecha)return a;
  const [dd,mm,yy]=refFecha.split('/').map(Number);
  const sd=new Date(yy,mm-1,dd);
  const TODAY=new Date();
  [40,60].forEach(n=>{
    const dt=new Date(sd);dt.setDate(dt.getDate()+n);
    const r=Math.round((dt-TODAY)/86400000);
    if(r>=0&&r<=5)a.push({tipo:r<=2?'urg':'info',icon:'ti-microscope',msg:`Análisis N en ${r}d (d${n} · ${dt.getDate()}/${dt.getMonth()+1})`});
  });
  return a;
}

function totalUrea(d){return season==='inv'?(d.urea_siem?.kg||0)+(d.z22?.kg||0)+(d.z30?.kg||0)+(d.z33?.kg||0):(d.urea_siem?.kg||0)+(d.v4?.kg||0)+(d.v8?.kg||0);}
function pctArea(rows,fn){const t=rows.reduce((a,r)=>a+r.has,0);return t?Math.round(rows.filter(fn).reduce((a,r)=>a+r.has,0)/t*100):0;}
function colPct(p){return p>=70?'var(--green)':p>=40?'var(--amber)':'var(--red)';}

function renderDetail(d){

  }
  return h;
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  const rows=filtered();
  const CL=season==='inv'?CL_INV:CL_VER;
  const cults=[...new Set(rows.map(d=>d.cult).filter(Boolean))].sort();
  document.getElementById('cult-chips').innerHTML=[{v:'all',l:'Todos'},...cults.map(c=>{return{v:c,l:CL[c]||c};})]
    .map(c=>`<div class="fchip${filtCult===c.v?' on':''}" onclick="setFilt('${c.v}',this)">${c.l}</div>`).join('');
  const prod=rows.filter(isProd);
  const grp={};rows.forEach(d=>{(grp[d.campo]||(grp[d.campo]=[])).push(d);});
  const aall=[];rows.forEach(d=>getLoteAlerts(d).forEach(a=>aall.push({...a,campo:d.campo,lote:d.lote})));
  const ael=document.getElementById('alerts');
  if(season!=='inv'||!aall.length){ael.innerHTML=`<span class="no-al"><i class="ti ti-circle-check" style="color:var(--green);font-size:13px;"></i>Sin alertas activas</span>`;}
  else{ael.innerHTML=`<span class="al"><i class="ti ti-bell-ringing"></i>Alertas</span>`+aall.slice(0,6).map(a=>`<div class="ap ${a.tipo}"><i class="ti ${a.icon}"></i><strong>${a.campo} L${a.lote}</strong> · ${a.msg}</div>`).join('');}
  const totH=rows.reduce((a,r)=>a+r.has,0);
  const MC=(icon,lbl,val,sub,bar,col)=>`<div class="metric"><div class="ml"><i class="ti ${icon}"></i>${lbl}</div><div class="mv">${val}</div>${sub?`<div class="ms">${sub}</div>`:''}</div>`;
  const urows=season==='ver'?rows.filter(isMz):prod;
  const conU=urows.filter(d=>totalUrea(d)>0);
  const promU=conU.length?Math.round(conU.reduce((a,d)=>a+totalUrea(d)*d.has,0)/conU.reduce((a,d)=>a+d.has,0)):0;
  
  const pR=pctArea(prod,d=>d.rep?.fecha),pF1=pctArea(prod,d=>d.f1?.prod),pF2=pctArea(prod,d=>d.f2?.prod),pZn=pctArea(prod,d=>d.znf?.dosis);
  document.getElementById('metrics').innerHTML=
    MC('ti-map','Has',Math.round(totH).toLocaleString('es'),`${rows.length} lotes`,null,null)+
    MC('ti-flask',season==='ver'?'Urea maíz':'Urea az.',promU?promU+' kg/ha':'—',`${conU.length} lotes`,null,null)+
    MC('ti-repeat','Repaso',pR+'%','% área',pR,colPct(pR))+
    MC('ti-shield','Fung 1',pF1+'%','% área',pF1,colPct(pF1))+
    MC('ti-shield-check','Fung 2',pF2+'%','% área',pF2,colPct(pF2))+
    MC('ti-droplet','Zinc fol.',pZn+'%','% área',pZn,colPct(pZn));
  const el=document.getElementById('campos');el.innerHTML='';
  if(!rows.length){el.innerHTML=`<div class="empty"><i class="ti ti-plant-off"></i>Sin datos para esta temporada</div>`;return;}
  Object.entries(grp).forEach(([campo,lotes])=>{
    const ini=INI[campo]||campo.slice(0,2).toUpperCase();
    const totHc=Math.round(lotes.reduce((a,r)=>a+r.has,0));
    const nA=lotes.reduce((a,d)=>a+getLoteAlerts(d).length,0);
    const k=campo+season+activeCamp;const isOpen=openC.has(k);
    const card=document.createElement('div');card.className='ccard';
    const safe=s=>s.replace(/'/g,"\'");
    card.innerHTML=`<div class="chdr" onclick="togC('${safe(campo)}',this)"><div class="mono">${ini}</div><div><div class="cn">${campo}</div><div class="cm">${lotes.length} lotes · ${totHc.toLocaleString('es')} ha</div></div><div class="cr">${nA?`<span class="abadge"><i class="ti ti-bell" style="font-size:10px;"></i>${nA}</span>`:''}</div><i class="ti ti-chevron-right chev ${isOpen?'open':''}"></i></div>
      <div class="llist ${isOpen?'open':''}" id="ll-${campo.replace(/\s/g,'_')}-${season}">${lotes.map(d=>{
        const lk=`${campo}|${d.lote}|${season}|${activeCamp}`;const isLo=openL.has(lk);
        const hasRe=d.re1?.var||d.re1?.fecha;const alerts=getLoteAlerts(d);
        const prevL=season==='inv'?'Ver ant.':'Inv ant.';const curL=season==='inv'?`Inv ${activeCamp}`:`Ver ${activeCamp}`;const nextL=season==='inv'?'Ver':'Inv';
        return `<div class="lrow"><div class="lhdr" onclick="togL('${safe(campo)}','${safe(d.lote)}',this)"><span class="lnum">${d.lote}</span><span class="lhas">${Math.round(d.has)} ha</span><span class="cbadge ${CB[d.cult]||'b-Cobertura'}">${CL[d.cult]||d.cult||'—'}</span>${hasRe?'<span class="re-tag">resiembra</span>':''}${alerts.length?`<div class="lrow-al">${alerts.map(a=>`<span class="la ${a.tipo}"><i class="ti ${a.icon}"></i>${a.msg}</span>`).join('')}</div>`:''}
          <div class="rot"><div class="ri"><div class="rl">${prevL}</div>${rotB(d.antec||'—')}</div><span class="rarr">›</span><div class="ri cur"><div class="rl">${curL}</div>${rotB(d.cult)}</div><span class="rarr">›</span><div class="ri"><div class="rl">${nextL}</div>${rotB('?')}</div></div>
          <i class="ti ti-chevron-right chev ${isLo?'open':''}" style="font-size:11px;margin-left:6px;"></i></div>
          <div class="ldet ${isLo?'open':''}" id="ld-${campo.replace(/\s/g,'_')}_${d.lote.replace(/\s/g,'_')}_${season}">${renderDetail(d)}</div></div>`;
      }).join('')}</div>`;
    el.appendChild(card);
  });
}

function togC(campo,el){const k=campo+season+activeCamp;openC.has(k)?openC.delete(k):openC.add(k);document.getElementById('ll-'+campo.replace(/\s/g,'_')+'-'+season).classList.toggle('open');el.querySelector('.chev').classList.toggle('open');}
function togL(campo,lote,el){const k=`${campo}|${lote}|${season}|${activeCamp}`;openL.has(k)?openL.delete(k):openL.add(k);document.getElementById(`ld-${campo.replace(/\s/g,'_')}_${lote.replace(/\s/g,'_')}_${season}`).classList.toggle('open');el.querySelector('.chev').classList.toggle('open');}
function setSeason(s,el){season=s;filtCult='all';document.querySelectorAll('.fstrip .fchip[onclick^="setSeason"]').forEach(x=>x.classList.remove('on'));el.classList.add('on');render();}
function setFilt(c,el){filtCult=c;document.querySelectorAll('#cult-chips .fchip').forEach(x=>x.classList.remove('on'));el.classList.add('on');render();}

// ── START ─────────────────────────────────────────────────────
let xlsxReady = false;
let domReady = false;

function tryStart(){
  if(xlsxReady && domReady) initApp();
}

function xlsxFallback(){
  // XLSX failed from CDN, try unpkg
  const s = document.createElement('script');
  s.src = 'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js';
  s.onload = ()=>{ xlsxReady=true; tryStart(); };
  s.onerror = ()=>{
    document.getElementById('splash').innerHTML +=
      '<div style="color:red;font-size:12px;padding:16px;">Error: no se pudo cargar la librería Excel. Verificá tu conexión.</div>';
  };
  document.head.appendChild(s);
}

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', ()=>{ domReady=true; tryStart(); });
} else {
  domReady = true;
  tryStart();
}



<script>
// Unregister any service workers
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  });
}
</script>
