<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Agricultura Litoral Norte</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="LN Agro">
<link rel="apple-touch-icon" href="LOGO.jpeg">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#18180f;min-height:100vh;}
#splash{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:200;}
#splash.hide{display:none;}
.sp-img{width:110px;height:auto;}
.sp-sub{font-size:12px;color:#999;}
.hdr{background:#fff;border-bottom:1px solid #e8e6de;padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.hdr-logo{height:26px;width:auto;}
.hdr-r{display:flex;gap:5px;align-items:center;margin-left:auto;}
.cpill{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid #ccc;cursor:pointer;color:#666;font-weight:500;}
.cpill.on{background:#eeedfe;border-color:#534AB7;color:#534AB7;font-weight:600;}
.sync{font-size:10px;color:#1a8a5a;display:flex;align-items:center;gap:3px;}
.ibtn{padding:5px;border-radius:6px;cursor:pointer;color:#666;font-size:16px;border:none;background:transparent;}
.fstrip{background:#fff;border-bottom:1px solid #e8e6de;padding:7px 16px;display:flex;gap:5px;overflow-x:auto;align-items:center;scrollbar-width:none;}
.fstrip::-webkit-scrollbar{display:none;}
.fl{font-size:9px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-right:3px;white-space:nowrap;flex-shrink:0;}
.fchip{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #ccc;cursor:pointer;color:#666;white-space:nowrap;flex-shrink:0;}
.fchip.on{border-color:#333;color:#333;background:#f8f7f3;font-weight:600;}
.fsep{width:1px;height:16px;background:#e8e6de;margin:0 3px;flex-shrink:0;}
.mwrap{background:#fff;border-bottom:1px solid #e8e6de;padding:8px 16px;overflow-x:auto;scrollbar-width:none;}
.mwrap::-webkit-scrollbar{display:none;}
.metrics{display:flex;gap:6px;min-width:max-content;}
.metric{background:#f8f7f3;border-radius:7px;padding:7px 10px;min-width:84px;}
.ml{font-size:9px;color:#999;margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
.mv{font-size:17px;font-weight:600;}
.ms{font-size:9px;color:#999;margin-top:1px;white-space:nowrap;}
.mbar{width:100%;height:3px;border-radius:2px;background:#e8e6de;margin-top:4px;}
.mfill{height:3px;border-radius:2px;}
.campos{padding:10px 12px;display:flex;flex-direction:column;gap:8px;padding-bottom:50px;}
.ccard{background:#fff;border:1px solid #e8e6de;border-radius:12px;overflow:hidden;}
.chdr{padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none;}
.chdr:active{background:#f8f7f3;}
.mono{width:34px;height:34px;border-radius:8px;background:#f8f7f3;border:1px solid #e8e6de;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#666;flex-shrink:0;}
.cn{font-size:13px;font-weight:600;}.cm{font-size:10px;color:#999;margin-top:1px;}
.chev{font-size:13px;color:#999;margin-left:auto;transition:transform .2s;}
.chev.open{transform:rotate(90deg);}
.llist{border-top:1px solid #e8e6de;display:none;}
.llist.open{display:block;}
.lrow{border-bottom:1px solid #e8e6de;}
.lrow:last-child{border-bottom:none;}
.lhdr{display:flex;align-items:flex-start;gap:7px;padding:8px 14px;flex-wrap:wrap;cursor:pointer;}
.lhdr:active{background:#f8f7f3;}
.lnum{font-size:11px;font-weight:600;color:#666;min-width:22px;margin-top:2px;}
.lhas{font-size:11px;color:#999;min-width:38px;margin-top:2px;}
.cbadge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.bTr{background:#E6F1FB;color:#185FA5;}.bCz{background:#FAEEDA;color:#633806;}
.bCeb{background:#EAF3DE;color:#3B6D11;}.bCob{background:#F1EFE8;color:#5F5E5A;}
.bCar{background:#F3E8F5;color:#5A1E63;}.bSj1{background:#EEEDFE;color:#3C3489;}
.bSj2{background:#E1EAFC;color:#2A4A8A;}.bMz1{background:#FAECE7;color:#712B13;}
.bMz2{background:#F5E0D8;color:#5C1E0A;}
.re-tag{font-size:10px;background:#fdf3e0;color:#c47a12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap;}
.rot{display:flex;gap:2px;align-items:center;margin-left:auto;}
.ri{display:flex;flex-direction:column;align-items:center;gap:1px;}
.rl{font-size:8px;color:#999;white-space:nowrap;}
.ri.cur .rl{color:#534AB7;font-weight:700;}
.rb{font-size:10px;padding:1px 4px;border-radius:3px;font-weight:500;}
.rarr{font-size:9px;color:#ccc;margin-top:7px;}
.ldet{display:none;background:#f8f7f3;border-top:1px solid #e8e6de;}
.ldet.open{display:block;}
.dbanner{padding:8px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid #e8e6de;background:#fff;}
.dvar{font-size:12px;font-weight:600;}
.re-pb{display:flex;align-items:center;gap:8px;padding:5px 14px 0;}
.re-pbl{font-size:10px;color:#999;}
.re-pbg{flex:1;height:4px;border-radius:2px;background:#e8e6de;}
.re-pf{height:4px;border-radius:2px;background:#c47a12;}
.re-pv{font-size:11px;font-weight:600;color:#c47a12;min-width:28px;text-align:right;}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid #e8e6de;}
@media(max-width:480px){.sgrid{grid-template-columns:1fr;}}
.sec{padding:10px 12px;border-right:1px solid #e8e6de;}
.sec:last-child{border-right:none;}
@media(max-width:480px){.sec{border-right:none;border-bottom:1px solid #e8e6de;}.sec:last-child{border-bottom:none;}}
.st{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#999;margin-bottom:7px;display:flex;align-items:center;gap:4px;}
.li{display:flex;align-items:flex-start;gap:5px;margin-bottom:3px;padding:4px 6px;border-radius:6px;}
.li.done{background:#fff;}.li.pend{opacity:.3;}.li.finn{background:#e8eef8;}
.li i{font-size:13px;margin-top:1px;flex-shrink:0;}
.li.done i,.li.finn i{color:#1a8a5a;}.li.pend i{color:#ccc;}.li.re i{color:#c47a12;}
.lb{flex:1;min-width:0;}
.ln{font-size:11px;font-weight:600;}
.ld{font-size:10px;color:#666;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lf{font-size:10px;color:#1a8a5a;margin-top:1px;}
.ff{display:inline-flex;align-items:center;vertical-align:middle;margin-left:3px;}
.ff img{width:13px;height:13px;object-fit:contain;opacity:.85;}
.fsec{padding:10px 12px;}
.ftit{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#999;margin-bottom:8px;display:flex;align-items:center;gap:4px;}
.fgrp{margin-bottom:10px;}
.fgl{font-size:10px;color:#999;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid #e8e6de;font-weight:500;}
.frow{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:5px;}
.fc{border-radius:7px;padding:7px 8px;background:#fff;}
.fc.done{border-left:2px solid #1a8a5a;}.fc.pend{border-left:2px solid #e8e6de;opacity:.38;}
.fc.finn{border-left:2px solid #002060;background:#e8eef8;}
.fc.total{background:#eeedfe;border-left:2px solid #534AB7;}
.fcl{font-size:9px;color:#999;margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
.fc.total .fcl{color:#534AB7;}
.fcv{font-size:13px;font-weight:600;}
.fc.total .fcv{color:#534AB7;}
.fcu{font-size:9px;font-weight:400;color:#999;margin-left:1px;}
.fc.total .fcu{color:#534AB7;}
.fcd{font-size:9px;color:#1a8a5a;margin-top:2px;}
.hbar{width:100%;height:3px;border-radius:2px;background:#e8e6de;margin-top:3px;}
.hbarf{height:3px;border-radius:2px;background:#1a8a5a;}
.empty{padding:36px;text-align:center;color:#999;font-size:13px;}
</style>
</head>
<body>
<div id="splash">
  <img src="LOGO.jpeg" class="sp-img" alt="LN Agro">
  <div class="sp-sub">Seguimiento de labores</div>
</div>
<div id="app" style="display:none;">
  <div class="hdr">
    <img src="LOGO.jpeg" class="hdr-logo" alt="LN Agro">
    <div class="hdr-r">
      <div id="cpills" style="display:flex;gap:4px;"></div>
      <div class="sync" id="sync" style="display:none;"><i class="ti ti-cloud-check"></i><span id="synctxt"></span></div>
      <button class="ibtn" id="btnRefresh"><i class="ti ti-refresh"></i></button>
    </div>
  </div>
  <div class="fstrip">
    <span class="fl">Cultivo</span>
    <div id="cchips" style="display:flex;gap:5px;"></div>
    <div class="fsep"></div>
    <span class="fl">Estacion</span>
    <div class="fchip on" id="btn-inv">Invierno</div>
    <div class="fchip" id="btn-ver">Verano</div>
  </div>
  <div id="alerts" style="background:#fff;border-bottom:1px solid #e8e6de;padding:6px 16px;min-height:34px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;"></div>
  <div class="mwrap"><div class="metrics" id="metrics"></div></div>
  <div class="campos" id="campos"></div>
</div>

<script src="data.js"></script>
<script>
var FINN_COLOR = 'FF002060';
var CLI = {Tr:'Trigo',Cz:'Colza',Ceb:'Cebada',Cobertura:'Cob.',Carinata:'Car.'};
var CLV = {Sj1:'Soja 1',Sj2:'Soja 2',Mz1:'Maiz 1',Mz2:'Maiz 2',Cobertura:'Cob.'};
var BCL = {Tr:'bTr',Cz:'bCz',Ceb:'bCeb',Cobertura:'bCob',Carinata:'bCar',Sj1:'bSj1',Sj2:'bSj2',Mz1:'bMz1',Mz2:'bMz2'};
var INI = {Malacara:'ML','La Blanqueada':'LB','La Campana':'LC',Montecristo:'MC','Santa Rafaela':'SR','San Luis':'SL',Pereira:'PE'};
var RAW = 'https://raw.githubusercontent.com/CeibosGroup/Agricultura-Litoral-Norte/main';
var AD = JSON.parse(JSON.stringify(HISTORIC));
var AC = null, SE = 'inv', FC = 'all';
var openC = {}, openL = {};

function q(id) { return document.getElementById(id); }
function colPct(p) { return p>=70?'#1a8a5a':p>=40?'#c47a12':'#b83030'; }
function pctArea(rows,fn) { var t=rows.reduce(function(a,r){return a+r.has;},0); if(!t)return 0; return Math.round(rows.filter(fn).reduce(function(a,r){return a+r.has;},0)/t*100); }
function isProd(d) { return SE==='inv'?['Tr','Cz','Ceb','Carinata'].indexOf(d.cult)>=0:['Sj1','Sj2','Mz1','Mz2'].indexOf(d.cult)>=0; }
function isMz(d) { return d.cult==='Mz1'||d.cult==='Mz2'; }
function totalUrea(d) { if(SE==='inv')return(d.urea_siem&&d.urea_siem.kg||0)+(d.z22&&d.z22.kg||0)+(d.z30&&d.z30.kg||0)+(d.z33&&d.z33.kg||0); return(d.urea_siem&&d.urea_siem.kg||0)+(d.v4&&d.v4.kg||0)+(d.v8&&d.v8.kg||0); }
function sid(s) { var h=0; for(var i=0;i<s.length;i++){h=(Math.imul(31,h)+s.charCodeAt(i))|0;} return 'x'+(h>>>0).toString(36); }
function FS() { var img=document.createElement('img'); img.src='data:image/png;base64,'+FINN_B64; img.style.cssText='width:13px;height:13px;object-fit:contain;opacity:.85;vertical-align:middle;margin-left:3px;'; return img.outerHTML; }
function rotB(c) {
  if(!c) return '<span style="font-size:8px;color:#ccc">?</span>';
  var CL=SE==='inv'?CLI:CLV;
  var el=document.createElement('span');
  el.className='rb '+(BCL[c]||'bCob');
  el.textContent=CL[c]||c;
  return el.outerHTML;
}

// ── EVENT LISTENERS (no inline onclick needed) ────────────────
document.addEventListener('DOMContentLoaded', function() {
  q('btn-inv').onclick = function() { setSeason('inv'); };
  q('btn-ver').onclick = function() { setSeason('ver'); };
  q('btnRefresh').onclick = function() { updateBg(); };

  // Delegated clicks
  document.addEventListener('click', function(e) {
    var chdr = e.target.closest('.chdr[data-cid]');
    if(chdr) { togC(chdr.getAttribute('data-cid')); return; }
    var lhdr = e.target.closest('.lhdr[data-lid]');
    if(lhdr) { togL(lhdr.getAttribute('data-lid')); return; }
  });

  start();
  loadXLSX();
});

function start() {
  AD = JSON.parse(JSON.stringify(HISTORIC));
  var camps = Object.keys(AD).sort().reverse();
  AC = camps[0];
  q('splash').classList.add('hide');
  q('app').style.display = 'block';
  buildPills(camps);
  render();
}

function loadXLSX() {
  var s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload = updateBg;
  document.body.appendChild(s);
}

async function updateBg() {
  if(typeof XLSX === 'undefined') return;
  var now = new Date();
  for(var y = now.getFullYear()+2; y >= 2024; y--) {
    var yy = String(y).slice(2), yp = String(y+1).slice(2), camp = yy+'-'+yp;
    try {
      var ctrl = new AbortController();
      setTimeout(function(){ctrl.abort();}, 12000);
      var res = await fetch(RAW+'/Planilla_labores_'+yy+'-'+yp+'.xlsx', {cache:'no-store', signal:ctrl.signal});
      if(!res.ok) continue;
      var buf = await res.arrayBuffer(), wb = XLSX.read(buf, {cellStyles:true});
      AD[camp] = {inv: parseSheet(wb,'Invierno'), ver: parseSheet(wb,'Verano')};
      var camps = Object.keys(AD).sort().reverse(); AC = camps[0];
      buildPills(camps); render();
      q('synctxt').textContent = camp; q('sync').style.display = 'flex';
      break;
    } catch(e) { continue; }
  }
}

function buildPills(camps) {
  var el = q('cpills'); el.innerHTML = '';
  camps.forEach(function(c) {
    var d = document.createElement('div');
    d.className = 'cpill' + (c===AC ? ' on' : '');
    d.textContent = c;
    d.onclick = (function(camp){ return function(){ setCamp(camp); }; })(c);
    el.appendChild(d);
  });
}

function setCamp(c) {
  AC = c;
  document.querySelectorAll('.cpill').forEach(function(el) {
    el.classList.toggle('on', el.textContent===c);
  });
  render();
}

function setSeason(s) {
  SE = s; FC = 'all';
  q('btn-inv').classList.toggle('on', s==='inv');
  q('btn-ver').classList.toggle('on', s==='ver');
  render();
}

function setFilt(c) {
  FC = c;
  document.querySelectorAll('#cchips .fchip').forEach(function(el) {
    el.classList.toggle('on', el.getAttribute('data-v')===c);
  });
  render();
}

function getLoteAlerts(d) {
  var a = [];
  if(SE!=='inv'||d.cult!=='Cz') return a;
  var ref = d.siem&&d.siem.fecha ? d.siem.fecha : null;
  if(d.re1&&d.re1.fecha&&d.re1.ha&&d.has&&Math.round(d.re1.ha/d.has*100)>=50) ref = d.re1.fecha;
  if(!ref) return a;
  var p = ref.split('/');
  var sd = new Date(+p[2],+p[1]-1,+p[0]), TODAY = new Date();
  [40,60].forEach(function(n) {
    var dt = new Date(sd); dt.setDate(dt.getDate()+n);
    var r = Math.round((dt-TODAY)/86400000);
    if(r>=0&&r<=5) a.push({tipo:r<=2?'urg':'info', msg:'Analisis N en '+r+'d (d'+n+')'});
  });
  return a;
}

function filtered() {
  var cd = AD[AC]; if(!cd) return [];
  var src = SE==='inv' ? cd.inv : cd.ver; if(!src) return [];
  return FC==='all' ? src : src.filter(function(d){return d.cult===FC;});
}


function renderAlerts(rows) {
  var al = q('alerts');
  if(SE !== 'inv') {
    al.innerHTML = '<span style="font-size:11px;color:#999;display:flex;align-items:center;gap:4px;"><i class="ti ti-circle-check" style="color:#1a8a5a;font-size:13px;"></i>Sin alertas activas</span>';
    return;
  }
  var all = [];
  rows.forEach(function(d) {
    getLoteAlerts(d).forEach(function(a) {
      all.push({campo:d.campo, lote:d.lote, tipo:a.tipo, msg:a.msg});
    });
  });
  if(!all.length) {
    al.innerHTML = '<span style="font-size:11px;color:#999;display:flex;align-items:center;gap:4px;"><i class="ti ti-circle-check" style="color:#1a8a5a;font-size:13px;"></i>Sin alertas activas</span>';
    return;
  }
  var h = '<span style="font-size:9px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-right:2px;display:flex;align-items:center;gap:3px;white-space:nowrap;"><i class="ti ti-bell-ringing"></i>Alertas</span>';
  all.slice(0,6).forEach(function(a) {
    var bg = a.tipo==='urg'?'#fceaea':'#eeedfe';
    var col = a.tipo==='urg'?'#b83030':'#534AB7';
    h += '<div style="font-size:11px;padding:2px 8px;border-radius:20px;background:'+bg+';color:'+col+';display:flex;align-items:center;gap:4px;white-space:nowrap;font-weight:500;">';
    h += '<i class="ti ti-microscope" style="font-size:10px;"></i>';
    h += '<strong>'+a.campo+' L'+a.lote+'</strong> &middot; '+a.msg+'</div>';
  });
  al.innerHTML = h;
  // Push notification
  pushNotifications(all);
}

function pushNotifications(alerts) {
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default') {
    Notification.requestPermission();
    return;
  }
  if(Notification.permission !== 'granted') return;
  // Only notify once per session
  if(window._notifSent) return;
  window._notifSent = true;
  alerts.slice(0,3).forEach(function(a) {
    try {
      new Notification('LN Agro - Colza '+a.campo+' L'+a.lote, {
        body: a.msg,
        icon: 'LOGO.jpeg'
      });
    } catch(e) {}
  });
}

function render() {
  var rows = filtered(), CL = SE==='inv'?CLI:CLV, prod = rows.filter(isProd);

  // Cult chips
  var cults = [];
  rows.forEach(function(d){if(d.cult&&cults.indexOf(d.cult)<0)cults.push(d.cult);}); cults.sort();
  var cchips = q('cchips'); cchips.innerHTML = '';
  [{v:'all',l:'Todos'}].concat(cults.map(function(c){return{v:c,l:CL[c]||c};})).forEach(function(o) {
    var el = document.createElement('div');
    el.className = 'fchip'+(FC===o.v?' on':'');
    el.setAttribute('data-v', o.v);
    el.textContent = o.l;
    el.onclick = (function(v){return function(){setFilt(v);};})(o.v);
    cchips.appendChild(el);
  });

  // Metrics
  var totH = rows.reduce(function(a,r){return a+r.has;},0);
  var urows = SE==='ver'?rows.filter(isMz):prod;
  var conU = urows.filter(function(d){return totalUrea(d)>0;});
  var promU = conU.length ? Math.round(conU.reduce(function(a,d){return a+totalUrea(d)*d.has;},0)/conU.reduce(function(a,d){return a+d.has;},0)) : 0;
  var pR=pctArea(prod,function(d){return d.rep&&d.rep.fecha;}),pF1=pctArea(prod,function(d){return d.f1&&d.f1.prod;}),pF2=pctArea(prod,function(d){return d.f2&&d.f2.prod;}),pZn=pctArea(prod,function(d){return d.znf&&d.znf.dosis;});
  function MC(lbl,val,sub,bar,col){return '<div class="metric"><div class="ml">'+lbl+'</div><div class="mv">'+val+'</div>'+(sub?'<div class="ms">'+sub+'</div>':'')+(bar!=null?'<div class="mbar"><div class="mfill" style="width:'+bar+'%;background:'+col+';"></div></div>':'')+'</div>';}
  q('metrics').innerHTML = MC('Has',Math.round(totH).toLocaleString('es'),rows.length+' lotes',null,null)+MC(SE==='ver'?'Urea maiz':'Urea az.',promU?promU+' kg/ha':'—',conU.length+' lotes',null,null)+MC('Repaso',pR+'%','% area',pR,colPct(pR))+MC('Fung 1',pF1+'%','% area',pF1,colPct(pF1))+MC('Fung 2',pF2+'%','% area',pF2,colPct(pF2))+MC('Zinc fol.',pZn+'%','% area',pZn,colPct(pZn));

  // Campos
  var grp = {};
  rows.forEach(function(d){if(!grp[d.campo])grp[d.campo]=[];grp[d.campo].push(d);});
  var el = q('campos'); el.innerHTML = '';
  // Render alerts
  renderAlerts(rows);
  if(!rows.length){el.innerHTML='<div class="empty">Sin datos para esta temporada</div>';return;}

  Object.keys(grp).forEach(function(campo) {
    var lotes = grp[campo];
    var ini = INI[campo]||campo.slice(0,2).toUpperCase();
    var totHc = Math.round(lotes.reduce(function(a,r){return a+r.has;},0));

function togC(cid) {

function togL(lid) {
  openL[lid] = !openL[lid];
  var det = q(lid);
  if(det) {
    if(!det.innerHTML.trim()) {
      // Find the lote data
      var src = AD[AC]&&(SE==='inv'?AD[AC].inv:AD[AC].ver)||[];

      for(var i=0;i<src.length;i++) {
        var d=src[i];
        if(sid(d.campo+'|'+d.lote+'|'+SE+'|'+AC)===lid) {
          det.innerHTML = renderDetail(d);

    var icon = det.previousElementSibling&&det.previousElementSibling.querySelector('.ti-chevron-right');
