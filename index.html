async function parseFinnReporte(wb){
  if(wb.SheetNames.indexOf('hoja1')<0)return;
  var ws=wb.Sheets['hoja1'];if(!ws||!ws['!ref'])return;
  var rng=XLSX.utils.decode_range(ws['!ref']);
  var gv=function(r,c){var cell=ws[XLSX.utils.encode_cell({r:r,c:c})];return cell?cell.v:null;};
  var EMAP={'UY_EL MALACARA':'Malacara','UY_LA BLANQUEADA':'La Blanqueada','UY_LA CAMPANA':'La Campana',
    'UY_MONTECRISTO':'Montecristo','UY_SANTA RAFAELA':'Santa Rafaela','UY_SAN LUIS':'San Luis',
    'UY_DON JUAN DEL TALA':'Don Juan del Tala'};
  var newFinn={};
  for(var ri=1;ri<=rng.e.r;ri++){
    var estab=gv(ri,1);if(!estab||!EMAP[estab])continue;
    var campo=EMAP[estab];
    var loteFinn=String(gv(ri,4)||'').trim();
    if(!loteFinn||loteFinn.toLowerCase().indexOf('generico')>=0)continue;
    var lote=loteFinn;
    var pfx=['EL MALACARA_','El Malacara-','UY_LA BLANQUEADA_','LA CAMPANA_','La Campana-',
      'MONTE CRISTO_','Monte Cristo-','UY_SANTA RAFAELA_','UY_SAN LUIS_Lote ','UY_SAN LUIS_','UY_DON JUAN DEL TALA_'];
    for(var pi=0;pi<pfx.length;pi++){if(lote.indexOf(pfx[pi])===0){lote=lote.slice(pfx[pi].length);break;}}
    lote=lote.trim();
    if(estab!=='UY_SANTA RAFAELA'){
      lote=lote.replace(/^0+(\d)/,'$1').toUpperCase();
    } else {
      lote='L'+lote;
    }
    if(!newFinn[campo])newFinn[campo]=[];
    if(newFinn[campo].indexOf(lote)<0)newFinn[campo].push(lote);
  }
  Object.keys(newFinn).forEach(function(c){FINN_LOTES[c]=newFinn[c];});
}

async function updateBg(){
  if(typeof XLSX==='undefined')return;
  var now=new Date();
  for(var y=now.getFullYear()+2;y>=2024;y--){
    var yy=String(y).slice(2),yp=String(y+1).slice(2),camp=yy+'-'+yp;
    try{
      var ctrl=new AbortController();setTimeout(function(){ctrl.abort();},12000);
      var res=await fetch(RAW+'/Planilla%20labores%20'+yy+'-'+yp+'.xlsx?t='+Date.now(),{cache:'no-store',signal:ctrl.signal});
      if(!res.ok)continue;
      var buf=await res.arrayBuffer(),wb=XLSX.read(buf,{cellStyles:true});
      AD[camp]={inv:parseSheet(wb,'Invierno'),ver:parseSheet(wb,'Verano')};
      // Parse daily rainfall
      parseLluviasDiarias(wb);
      var camps=Object.keys(AD).sort().reverse();AC=camps[0];
      buildPills(camps);render();
      q('synctxt').textContent=camp;q('sync').style.display='flex';
      try{
        var ctrl2=new AbortController();setTimeout(function(){ctrl2.abort();},10000);
        var res2=await fetch(RAW+'/Reporte.xlsx?t='+Date.now(),{cache:'no-store',signal:ctrl2.signal});
        if(res2.ok){var buf2=await res2.arrayBuffer();var wb2=XLSX.read(buf2,{type:'array'});await parseFinnReporte(wb2);render();}
      }catch(e2){}
      break;
    }catch(e){continue;}
  }
}

function parseLluviasDiarias(wb){
  if(wb.SheetNames.indexOf('Lluvias')<0)return;
  var ws=wb.Sheets['Lluvias'];
  if(!ws||!ws['!ref'])return;
  var rng=XLSX.utils.decode_range(ws['!ref']);
  var gv=function(r,c){var cell=ws[XLSX.utils.encode_cell({r:r,c:c})];return cell?cell.v:null;};
  // Find daily section: look for 'REGISTRO DIARIO' in row 1 or a date in col AZ (col 51)
  // Daily section: col 51=AZ(Fecha), 52=BA(SR), 53=BB(ML), 54=BC(LC), 55=BD(MC), 56=BE(SL), 57=BF(LB)
  var START_COL=51; // 0-indexed = AZ
  var CAMPO_COLS=['Santa Rafaela','Malacara','La Campana','Montecristo','San Luis','La Blanqueada'];
  for(var ri=2;ri<=rng.e.r;ri++){
    var dateVal=gv(ri,START_COL);
    if(!dateVal)continue;
    var d;
    if(typeof dateVal==='number'){
      var parsed=XLSX.SSF.parse_date_code(dateVal);
      if(parsed)d=new Date(parsed.y,parsed.m-1,parsed.d);
    }else if(dateVal instanceof Date){d=dateVal;}
    else continue;
    if(!d||isNaN(d))continue;
    var y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate();
    var key=y+'-'+String(m).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    for(var ci=0;ci<CAMPO_COLS.length;ci++){
      var campo=CAMPO_COLS[ci];
      var val=gv(ri,START_COL+1+ci);
      if(val!=null&&typeof val==='number'&&val>=0){
        if(!LLUVIAS_HIST[campo])LLUVIAS_HIST[campo]={};
        if(!LLUVIAS_HIST[campo]['daily'])LLUVIAS_HIST[campo]['daily']={};
        LLUVIAS_HIST[campo]['daily'][key]=val;
      }
    }
  }
}

function getLoteAlerts(d){

  if(d.re1&&d.re1.fecha&&d.re1.ha&&d.has&&Math.round(d.re1.ha/d.has*100)>=50)ref=d.re1.fecha;
  if(!ref)return a;

  [40,60].forEach(function(n){var dt=new Date(sd);dt.setDate(dt.getDate()+n);var r=Math.round((dt-TODAY)/86400000);if(r>=0&&r<=5)a.push({tipo:r<=2?'urg':'info',msg:'N d'+n+' en '+r+'d ('+dt.getDate()+'/'+(dt.getMonth()+1)+')'});});

async function fetchOM(){
  // Returns promise
  var today=new Date();
  var yesterday=new Date(today);yesterday.setDate(yesterday.getDate()-1);
  var fmt=function(d){return d.toISOString().slice(0,10);};
  var params='&daily=temperature_2m_min,temperature_2m_max,et0_fao_evapotranspiration,shortwave_radiation_sum&timezone=America%2FSao_Paulo';
  var baseHist='https://archive-api.open-meteo.com/v1/archive?latitude='+LAT+'&longitude='+LON;
  var baseFore='https://api.open-meteo.com/v1/forecast?latitude='+LAT+'&longitude='+LON+'&past_days=92';
  try{
    // Fetch historical (2010 to yesterday) + recent forecast in parallel
    var results=await Promise.all([
      fetch(baseHist+params+'&start_date=2010-01-01&end_date='+fmt(yesterday)).then(function(r){return r.json();}),
      fetch(baseFore+params).then(function(r){return r.json();})
    ]);
    var hist=results[0],fore=results[1];
    // Merge: use hist as base, append fore dates not already in hist
    var allDates=hist.daily.time.slice();
    var allTmin=hist.daily.temperature_2m_min.slice();
    var allTmax=hist.daily.temperature_2m_max.slice();
    var allEtp=hist.daily.et0_fao_evapotranspiration.slice();
    var lastHistDate=allDates[allDates.length-1];
    if(fore.daily&&fore.daily.time){
      fore.daily.time.forEach(function(d,i){
        if(d>lastHistDate){
          allDates.push(d);
          allTmin.push(fore.daily.temperature_2m_min[i]);
          allTmax.push(fore.daily.temperature_2m_max[i]);
          allEtp.push(fore.daily.et0_fao_evapotranspiration[i]);
        }
      });
    }
    var histRad=hist.daily.shortwave_radiation_sum||[];
    var foreRad=fore.daily&&fore.daily.shortwave_radiation_sum?fore.daily.shortwave_radiation_sum:[];
    var allRad=histRad.slice();
    hist.daily.time.forEach(function(d,i){});
    fore.daily&&fore.daily.time&&fore.daily.time.forEach(function(d,i){if(d>lastHistDate)allRad.push(foreRad[i]||null);});
    omData={daily:{time:allDates,temperature_2m_min:allTmin,temperature_2m_max:allTmax,et0_fao_evapotranspiration:allEtp,shortwave_radiation_sum:allRad}};
    renderClima();
  }catch(e){
    console.error('OM error:',e);
    // Fallback: try just forecast with max past days
    try{
      var r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+LAT+'&longitude='+LON+'&past_days=92'+params);
      omData=await r.json();
      renderClima();
    }catch(e2){
      q('clima-content').innerHTML='<div style="padding:20px;text-align:center;color:#b83030;font-size:12px;">Error al cargar datos climáticos. Verificá tu conexión.</div>';
    }
  }
}

function getDateRange(){
  var today=new Date();
  var start;
  if(climaPeriod==='30d'){
    start=new Date(today);start.setDate(start.getDate()-30);
  } else if(climaPeriod==='campaign'){
    // Campaign: from first barbecho date in active campaign
    var firstBarb=null;
    var camp=AD[AC];
    if(camp&&camp.inv){
      camp.inv.forEach(function(d){
        if(d.barb&&d.barb.fecha){
          var p=d.barb.fecha.split('/');
          var bd=new Date(+p[2],+p[1]-1,+p[0]);
          if(!firstBarb||bd<firstBarb)firstBarb=bd;
        }
      });
    }
    // Fallback: April of current agric year
    if(!firstBarb){var y=today.getMonth()<3?today.getFullYear()-1:today.getFullYear();firstBarb=new Date(y,3,1);}
    start=firstBarb;
  } else if(climaPeriod==='agro'){
    // Agric year: Apr N to Mar N+1
    var y2=today.getMonth()<3?today.getFullYear()-1:today.getFullYear();
    start=new Date(y2,3,1);
  } else if(climaPeriod==='custom'){
    var fromEl=q('clima-date-from'),toEl=q('clima-date-to');
    var fromDate=fromEl?new Date(fromEl.value):new Date(2026,3,1);
    var toDate=toEl?new Date(toEl.value):today;
    return{start:fromDate,end:toDate};
  } else {
    start=new Date(2010,0,1);
  }
  return{start:start,end:today};
}

function getLluviasMensuales(campo,year,month){
  // Get monthly rainfall for a campo/year/month from historical data
  var d=LLUVIAS_HIST[campo];
  if(!d)return null;
  // Try daily first
  if(d.daily){
    var total=0,found=false;
    var y=year,m=month;
    var days=new Date(y,m,0).getDate();
    for(var day=1;day<=days;day++){
      var key=y+'-'+String(m).padStart(2,'0')+'-'+String(day).padStart(2,'0');
      if(d.daily[key]!=null){total+=d.daily[key];found=true;}
    }
    if(found)return total;
  }
  // Fall back to monthly historical
  var yd=d[String(year)];
  if(yd&&yd[month]!=null)return yd[month];
  return null;
}

function buildMonthlyData(startDate,endDate){
  // Returns array of {label, lluvia, tmin, tmax, etp, balance}
  var result=[];
  var omDates=omData&&omData.daily?omData.daily.time:[];
  var omTmin=omData&&omData.daily?omData.daily.temperature_2m_min:[];
  var omTmax=omData&&omData.daily?omData.daily.temperature_2m_max:[];
  var omEtp=omData&&omData.daily?omData.daily.et0_fao_evapotranspiration:[];

  // Build OM lookup by date
  var omByDate={};
  omDates.forEach(function(d,i){omByDate[d]={tmin:omTmin[i],tmax:omTmax[i],etp:omEtp[i]};});

  // Iterate months
  var cur=new Date(startDate.getFullYear(),startDate.getMonth(),1);
  var end=new Date(endDate.getFullYear(),endDate.getMonth(),1);
  while(cur<=end){
    var y=cur.getFullYear(),m=cur.getMonth()+1;
    var label=MESES[m-1]+' '+y;

    // Lluvia: from planilla (avg of selected campos or single campo)
    var campos=climaCampo==='all'?CAMPOS_STAT:[climaCampo];
    var lluviaVals=[];
    campos.forEach(function(c){var v=getLluviasMensuales(c,y,m);if(v!=null)lluviaVals.push(v);});
    var lluvia=lluviaVals.length?Math.round(lluviaVals.reduce(function(a,b){return a+b;},0)/lluviaVals.length):null;

    // OM monthly aggregates
    var tminArr=[],tmaxArr=[],etpSum=0,etpDays=0,heladaDays=0;
    var daysInMonth=new Date(y,m,0).getDate();
    for(var day=1;day<=daysInMonth;day++){
      var key=y+'-'+String(m).padStart(2,'0')+'-'+String(day).padStart(2,'0');
      var od=omByDate[key];
      if(od){
        if(od.tmin!=null){tminArr.push(od.tmin);if(od.tmin<0)heladaDays++;}
        if(od.tmax!=null)tmaxArr.push(od.tmax);
        if(od.etp!=null){etpSum+=od.etp;etpDays++;}
      }
    }
    var tmin=tminArr.length?Math.round(Math.min.apply(null,tminArr)*10)/10:null;
    var tmax=tmaxArr.length?Math.round(Math.max.apply(null,tmaxArr)*10)/10:null;
    var etp=etpDays?Math.round(etpSum):null;
    var balance=(lluvia!=null&&etp!=null)?Math.round(lluvia-etp):null;

    // T>30 days
    // Radiation
    var radArr=[];
    var omRad=omData.daily.shortwave_radiation_sum||[];
    for(var day4=1;day4<=daysInMonth;day4++){
      var k4=y+'-'+String(m).padStart(2,'0')+'-'+String(day4).padStart(2,'0');
      var idx4=omDates.indexOf(k4);
      if(idx4>=0&&omRad[idx4]!=null)radArr.push(omRad[idx4]);
    }
    var radAvg=radArr.length?Math.round(radArr.reduce(function(a,b){return a+b;},0)/radArr.length*10)/10:null;
    var dias30=0;
    for(var day2=1;day2<=daysInMonth;day2++){
      var k2=y+'-'+String(m).padStart(2,'0')+'-'+String(day2).padStart(2,'0');
      var od2=omByDate[k2];
      if(od2&&od2.tmax!=null&&od2.tmax>30)dias30++;
    }
    // Amplitud termica promedio
    var amplArr=[];
    for(var day3=1;day3<=daysInMonth;day3++){
      var k3=y+'-'+String(m).padStart(2,'0')+'-'+String(day3).padStart(2,'0');
      var od3=omByDate[k3];
      if(od3&&od3.tmax!=null&&od3.tmin!=null)amplArr.push(od3.tmax-od3.tmin);
    }
    var ampl=amplArr.length?Math.round(amplArr.reduce(function(a,b){return a+b;},0)/amplArr.length*10)/10:null;
    result.push({label:label,y:y,m:m,lluvia:lluvia,tmin:tmin,tmax:tmax,etp:etp,balance:balance,heladas:heladaDays,dias30:dias30,ampl:ampl,rad:radAvg});
    cur=new Date(y,m,1);
  }
  return result;
}


function calcHorasFrio(omData, startDate, endDate) {
  // Estimate cold hours (T < 7°C) using sinusoidal interpolation
  // Method: fit sinusoid between Tmin (at 6am) and Tmax (at 2pm)
  // Then integrate hours below threshold
  var dates = omData.daily.time;
  var tmins = omData.daily.temperature_2m_min;
  var tmaxs = omData.daily.temperature_2m_max;
  var total = 0;
  var THRESHOLD = 7;
  var startStr = startDate.toISOString().slice(0,10);
  var endStr = endDate.toISOString().slice(0,10);
  for(var i=0;i<dates.length;i++){
    if(dates[i]<startStr||dates[i]>endStr)continue;
    var tmin=tmins[i],tmax=tmaxs[i];
    if(tmin==null||tmax==null)continue;
    if(tmax<=THRESHOLD){total+=24;continue;}
    if(tmin>=THRESHOLD){continue;}
    // Sinusoidal method: T(h) = Tmean + A*cos(π*(h-14)/12)
    // where A = (Tmax-Tmin)/2, Tmean = (Tmax+Tmin)/2
    var A=(tmax-tmin)/2;
    var Tmean=(tmax+tmin)/2;
    // Count hours where T < THRESHOLD
    var hFrio=0;
    for(var h=0;h<24;h++){
      var T=Tmean+A*Math.cos(Math.PI*(h-14)/12);
      if(T<THRESHOLD)hFrio++;
    }
    total+=hFrio;
  }
  return Math.round(total);
}

function renderHorasFrio(omData) {

  var today=new Date();

  // Get colza lotes from current campaign
  var colzas=[];
  var camp=AD[AC];

    camp.inv.forEach(function(d){
      if(d.cult!=='Cz')return;
      var fechaRef=d.siem&&d.siem.fecha?d.siem.fecha:null;
      // Use resiembra date if >50% area
      if(d.re1&&d.re1.fecha&&d.re1.ha&&d.has&&Math.round(d.re1.ha/d.has*100)>=50)fechaRef=d.re1.fecha;
      if(!fechaRef)return;
      var p=fechaRef.split('/');

      if(isNaN(sDate))return;
      var varName=d.siem&&d.siem.var?d.siem.var:'Colza';
      // Normalize var name for lookup
      var hfKey=Object.keys(HORAS_FRIO_VAR).find(function(k){return varName.toLowerCase().indexOf(k.toLowerCase())>=0||k.toLowerCase().indexOf(varName.toLowerCase())>=0;});
      var hfData=hfKey?HORAS_FRIO_VAR[hfKey]:{min:600,max:800};
      var acum=calcHorasFrio(omData,sDate,cutoff);
      colzas.push({campo:d.campo,lote:d.lote,var:varName,fecha:fechaRef,acum:acum,min:hfData.min,max:hfData.max});
    });

  // Add Beatrix reference (not in campaign)
  var beatrixAcum=calcHorasFrio(omData,new Date(today.getFullYear(),3,15),cutoff);
  colzas.push({campo:'Referencia',lote:'—',var:'Beatrix',fecha:'15/04/'+today.getFullYear(),acum:beatrixAcum,min:1000,max:1200,isRef:true});

    html+='<div style="background:'+(c.isRef?'#f8f7f3':'#fff')+';border:1px solid #e8e6de;border-radius:8px;padding:10px 12px;margin-bottom:6px;">';
    html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">';
    html+='<div>';
    html+='<span style="font-size:12px;font-weight:600;">'+(c.isRef?'':''+c.campo+' L'+c.lote+' · ')+c.var+'</span>';
    if(c.isRef)html+=' <span style="font-size:9px;background:#f8f7f3;border:1px solid #e8e6de;color:#999;padding:1px 6px;border-radius:20px;margin-left:4px;">referencia</span>';
    html+='<div style="font-size:10px;color:#999;margin-top:1px;">Siembra: '+c.fecha+'</div>';
    html+='</div>';
    html+='<div style="text-align:right;">';
    html+='<div style="font-size:16px;font-weight:600;color:'+color+';">'+c.acum+'<span style="font-size:10px;font-weight:400;color:#999;margin-left:1px;">h</span></div>';
    html+='<div style="font-size:10px;color:#999;">req: '+c.min+'-'+c.max+'h</div>';
    html+='</div>';
    html+='</div>';
    // Progress bar
    html+='<div style="position:relative;">';

    html+='</div>';

function renderClima(){
  if(!omData){q('clima-content').innerHTML='<div class="clima-loading"><i class="ti ti-loader" style="font-size:20px;display:block;margin-bottom:8px;"></i>Cargando datos climáticos...</div>';return;}
  var range=getDateRange();
  var data=buildMonthlyData(range.start,range.end);
  if(!data.length){q('clima-content').innerHTML='<div class="clima-loading">Sin datos para el período seleccionado</div>';return;}

  // Destroy old charts
  if(climaChart){climaChart.destroy();climaChart=null;}
  if(climaChart2){climaChart2.destroy();climaChart2=null;}

  // Compute stats
  var totalLluvia=data.reduce(function(a,d){return a+(d.lluvia||0);},0);
  var totalHeladas=data.reduce(function(a,d){return a+d.heladas;},0);
  var tminMin=null,tminMinLabel='';
  var diasSinLluvia=0,totalDias=0;
  var mesMasLluvioso=null,mesMasLl=null,mesMenosLluvioso=null,mesMenosLl=null;
  var heladaTardia=null,heladaTardiaDate='';

    if(d.heladas>0&&d.m>=9){heladaTardia=d.heladas;heladaTardiaDate=d.label;}
  });

  // Days without rain from OM daily
  var omDates=omData.daily.time;
  var omPrec=omData.daily.et0_fao_evapotranspiration; // we don't have precip from OM for daily
  // Use our monthly data to count
  data.forEach(function(d){
    var days=new Date(d.y,d.m,0).getDate();
    totalDias+=days;
    if(d.lluvia!==null&&d.lluvia<1)diasSinLluvia+=days;
  });

  // Campo más lluvioso
  var campoMasLl=null,campoMasLlVal=null,campoMenosLl=null,campoMenosLlVal=null;
  CAMPOS_STAT.forEach(function(c){
    var total=0,cnt=0;
    data.forEach(function(d){var v=getLluviasMensuales(c,d.y,d.m);if(v!=null){total+=v;cnt++;}});
    if(cnt){
      var avg=Math.round(total/cnt*10)/10;
      if(campoMasLlVal===null||total>campoMasLlVal){campoMasLlVal=total;campoMasLl=c;}
      if(campoMenosLlVal===null||total<campoMenosLlVal){campoMenosLlVal=total;campoMenosLl=c;}
    }
  });

  var labels=data.map(function(d){return d.label;});
  var lluvias=data.map(function(d){return d.lluvia;});
  var tmins=data.map(function(d){return d.tmin;});
  var balances=data.map(function(d){return d.balance;});
  var heladasPts=data.map(function(d){return d.heladas>0?d.tmin:null;});

  var html='<div class="clima-wrap">';

var RAD_THRESH={
  'Trigo/Cebada':{months:[10,11],good:20,ok:15,label:'Trigo & Cebada',period:'Oct-Nov',why:'La radiación en espigazón y llenado de grano determina el peso del grano. Más MJ/m² = granos más pesados y mayor proteína.'},
  'Colza':{months:[8,9],good:18,ok:13,label:'Colza',period:'Ago-Sep',why:'Durante la floración y cuaje de silicuas, la radiación es clave para la fijación de aceite y rendimiento final.'},
  'Soja':{months:[1,2],good:22,ok:16,label:'Soja',period:'Ene-Feb',why:'En el período R5-R7 (llenado de granos), alta radiación maximiza la fotosíntesis y el rendimiento.'},
  'Maíz':{months:[12,1],good:22,ok:16,label:'Maíz',period:'Dic-Ene',why:'La floración y llenado del grano son los momentos más sensibles a la radiación solar.'}
};
var AMPL_THRESH={good:12,ok:8};

function semaforo(val,good,ok,inverse){
  if(val==null)return {color:'#999',label:'Sin datos',bg:'#f8f7f3'};
  if(!inverse){
    if(val>=good)return {color:'#1a8a5a',label:'Buena',bg:'#e8f5ee'};
    if(val>=ok)return {color:'#c47a12',label:'Regular',bg:'#fdf3e0'};
    return {color:'#b83030',label:'Baja',bg:'#fceaea'};
  } else {
    if(val<=good)return {color:'#1a8a5a',label:'Óptima',bg:'#e8f5ee'};
    if(val<=ok)return {color:'#c47a12',label:'Regular',bg:'#fdf3e0'};
    return {color:'#b83030',label:'Alta',bg:'#fceaea'};
  }
}

function renderIndicadores(){
  indInited=true;
  if(!omData){q('ind-content').innerHTML='<div style="padding:20px;text-align:center;color:#b83030;font-size:12px;">Sin datos climáticos disponibles</div>';return;}
  
  var today=new Date();
  var curYear=today.getFullYear();
  // Build monthly data for current year + previous for context
  var allData=buildMonthlyData(new Date(curYear-1,0,1),today);
  var byYearMonth={};
  allData.forEach(function(d){byYearMonth[d.y+'-'+d.m]=d;});

  var html='<div style="padding:10px 12px;padding-bottom:60px;">';

  // ── RADIACIÓN ──
  html+='<div style="font-size:11px;font-weight:700;color:#18180f;margin-bottom:8px;margin-top:2px;display:flex;align-items:center;gap:6px;"><i class="ti ti-sun" style="font-size:14px;color:#c47a12;"></i>Radiación solar por cultivo</div>';

  Object.keys(RAD_THRESH).forEach(function(key){
    var th=RAD_THRESH[key];
    // Get relevant months - use latest available year for those months

    th.months.forEach(function(m){
      // For months already passed this year use curYear, else curYear-1
      var y=(m>today.getMonth()+1)?curYear-1:curYear;

      if(key==='Maíz'&&m===12)y=curYear-1;
      if(key==='Maíz'&&m===1)y=curYear;
      var d=byYearMonth[y+'-'+m];
      if(d&&d.rad!=null)vals.push(d.rad);
    });
    var avg=vals.length?Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length*10)/10:null;
    var sem=semaforo(avg,th.good,th.ok,false);
    
    html+='<div style="background:#fff;border:1px solid #e8e6de;border-radius:10px;padding:12px;margin-bottom:8px;">';

    html+='</div></div>';
    // Progress bar
    var maxRef=th.good*1.2;
    var pct=avg!=null?Math.min(100,Math.round(avg/maxRef*100)):0;
    html+='<div style="width:100%;height:6px;border-radius:3px;background:#e8e6de;margin-bottom:6px;position:relative;">';
    html+='<div style="height:6px;border-radius:3px;background:'+sem.color+';width:'+pct+'%;"></div>';
    html+='<div style="position:absolute;left:'+Math.round(th.ok/maxRef*100)+'%;top:-2px;width:2px;height:10px;background:#c47a12;" title="Mínimo aceptable"></div>';

  // ── AMPLITUD TERMICA ──
  html+='<div style="font-size:11px;font-weight:700;color:#18180f;margin:12px 0 8px;display:flex;align-items:center;gap:6px;"><i class="ti ti-temperature" style="font-size:14px;color:#534AB7;"></i>Amplitud térmica</div>';
  
  // Last 3 months
  var amplMonths=[];
  for(var back=2;back>=0;back--){

    html+='<div style="font-size:18px;font-weight:600;color:'+sem2.color+'">'+(dm.ampl!=null?dm.ampl:'—')+'<span style="font-size:10px;font-weight:400;color:#999;margin-left:1px;">°C</span></div>';
    html+='<div style="font-size:11px;font-weight:600;background:'+sem2.bg+';color:'+sem2.color+';padding:2px 8px;border-radius:20px;display:inline-block;margin-top:2px;">'+sem2.label+'</div>';
    html+='</div></div>';
    if(dm.dias30>0){

  // Amplitud explanation
  html+='<div style="background:#f8f7f3;border:1px solid #e8e6de;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:10px;color:#666;line-height:1.5;">';
  html+='<i class="ti ti-info-circle" style="font-size:10px;color:#999;vertical-align:-1px;margin-right:3px;"></i>';

  html+='</div>';

  // ── T>30 resumen ──
  var dias30Total=allData.filter(function(d){return d.y===curYear;}).reduce(function(a,d){return a+d.dias30;},0);
  if(dias30Total>0){
    html+='<div style="background:#F3EAFD;border:1px solid #D4B8F0;border-radius:10px;padding:12px;margin-bottom:8px;">';

    html+='<span style="width:12px;height:12px;border-radius:50%;background:#7B2FBE;display:inline-block;flex-shrink:0;"></span>';

// ── XLSX PARSER ────────────────────────────────────────────────
function isFinn(cell){return cell&&cell.s&&cell.s.fgColor&&cell.s.fgColor.rgb===FINN_COLOR;}
function isFinnLote(campo,lote){
  var fl=FINN_LOTES[campo];
  if(!fl)return false;
  return fl.indexOf(String(lote))>=0;
}
function normCult(v){var m={CC:'Cobertura',cc:'Cobertura',Car:'Carinata',car:'Carinata'};return v?m[String(v).trim()]||String(v).trim():null;}
function fmtDate(v){if(v==null)return null;if(typeof v==='number'&&v>40000){var d=XLSX.SSF.parse_date_code(v);if(d)return String(d.d).padStart(2,'0')+'/'+String(d.m).padStart(2,'0')+'/'+d.y;}var s=String(v).trim();if(s.includes('/')&&s.length<=6){var p=s.split('/');if(p.length===2){try{return p[0].padStart(2,'0')+'/'+p[1].padStart(2,'0')+'/2026';}catch(e){}}}return s||null;}
function sfn(v){var n=parseFloat(v);return isNaN(n)?null:n;}
function findCol(h0,h1,grp,col,fb){var exact=col.length<=3,cur=null;for(var i=0;i<h0.length;i++){if(h0[i])cur=String(h0[i]).trim();if(cur&&cur.toLowerCase().indexOf(grp.toLowerCase())>=0&&h1[i]){var b=String(h1[i]).trim().toLowerCase();if(exact?b===col.toLowerCase():b.indexOf(col.toLowerCase())>=0)return i;}}return fb!=null?fb:null;}
function herbCols(h0,h1,grp){var SKIP=['fecha','contratista','ha','kg','origen semilla','sembradora','%'],cur=null,cols=[],fechaCol=null,finnCol=null;for(var i=0;i<h0.length;i++){if(h0[i])cur=String(h0[i]).trim();if(cur===grp&&h1[i]){var h=String(h1[i]).trim();if(SKIP.indexOf(h.toLowerCase())>=0){if(h.toLowerCase()==='fecha'&&!fechaCol)fechaCol=i;}else{cols.push({idx:i,name:h});if(!finnCol)finnCol=i;}}}return{cols:cols,fechaCol:fechaCol,finnCol:finnCol};}
function herbProds(v,hc){var parts=[];hc.cols.forEach(function(c){var val=c.idx<v.length?v[c.idx]:null;if(val!=null&&val!==''&&!(val instanceof Date)){try{parseFloat(val);parts.push(c.name+' '+val+'L');}catch(e){}}});return parts.join(' + ')||null;}
function parseSheet(wb,sheetName){
  if(wb.SheetNames.indexOf(sheetName)<0)return[];
  var ws=wb.Sheets[sheetName];if(!ws||!ws['!ref'])return[];
  var rng=XLSX.utils.decode_range(ws['!ref']),maxR=rng.e.r,maxC=rng.e.c;
  var gc=function(r,c){return ws[XLSX.utils.encode_cell({r:r,c:c})];};
  var gv=function(r,c){var cell=gc(r,c);return cell?cell.v:null;};
  var gf=function(r,c){return isFinn(gc(r,c));};
  var h0=[],h1=[];for(var ci=0;ci<=maxC;ci++){h0.push(gv(0,ci));h1.push(gv(1,ci));}
  var fc=function(g,c,fb){return findCol(h0,h1,g,c,fb);};
